  - name: pre-tool-use
    trigger: pre-tool-use
    description: "Block Tier 3 (irreversible) operations during Claude Code sessions"
    filename: pre-tool-use.sh
    script: |
      #!/usr/bin/env bash
      # pre-tool-use: block Tier 3 destructive operations.
      # Invoked by Claude Code PreToolUse hook before Bash tool executes.
      set -u
      input=$(cat)
      if command -v jq >/dev/null 2>&1; then
        tool_name=$(echo "$input" | jq -r '.tool_name // empty')
        cmd=$(echo "$input" | jq -r '.tool_input.command // empty')
      else
        tool_name=$(echo "$input" | grep -o '"tool_name":"[^"]*"' | cut -d'"' -f4)
        cmd=$(echo "$input" | grep -o '"command":"[^"]*"' | cut -d'"' -f4)
      fi
      [[ "$tool_name" != "Bash" ]] && exit 0
      [[ "${FORGECRAFT_ALLOW_DESTRUCTIVE:-0}" == "1" ]] && exit 0
      block() {
        echo "🚫 BLOCKED by pre-tool-use hook: $1" >&2
        echo "   Command: $cmd" >&2
        echo "   See docs/operation-classification.md" >&2
        echo "   To override (use with care): FORGECRAFT_ALLOW_DESTRUCTIVE=1 <command>" >&2
        exit 2
      }
      [[ "$cmd" =~ DROP[[:space:]]+TABLE ]] && block "DROP TABLE — Tier 3 irreversible"
      [[ "$cmd" =~ TRUNCATE[[:space:]] ]] && block "TRUNCATE — Tier 3 irreversible"
      if [[ "$cmd" =~ git[[:space:]]+push ]] && [[ "$cmd" =~ (-f|--force) ]] && [[ "$cmd" =~ (main|master) ]]; then
        block "force push to main — Tier 3 irreversible"
      fi
      if [[ "$cmd" =~ rm[[:space:]]+-rf ]] && [[ "$cmd" =~ (src|docs|migrations|\.git)[/[:space:]] ]]; then
        block "rm -rf on protected path — Tier 3"
      fi
      if [[ "$cmd" =~ git[[:space:]]+push[[:space:]]+origin[[:space:]]+(main|master) ]]; then
        echo "⚠️  Direct push to main detected. Use a PR instead." >&2
      fi
      exit 0

  - name: post-edit
    trigger: post-edit
    description: "After Write/Edit: check Bounded property (file size, console.log, any)"
    filename: post-edit.sh
    script: |
      #!/usr/bin/env bash
      # post-edit: enforce Bounded property after every file write/edit.
      set -u
      input=$(cat)
      if command -v jq >/dev/null 2>&1; then
        file_path=$(echo "$input" | jq -r '.tool_input.file_path // .tool_input.path // empty')
      else
        file_path=$(echo "$input" | grep -o '"file_path":"[^"]*"' | cut -d'"' -f4 | head -1)
      fi
      [[ -z "$file_path" ]] && exit 0
      [[ ! -f "$file_path" ]] && exit 0
      echo "$file_path" | grep -qE '(node_modules|pnpm-lock|package-lock|\.d\.ts$|\.min\.|/generated/)' && exit 0
      line_count=$(wc -l < "$file_path")
      if [[ "$line_count" -gt 300 ]]; then
        echo "⚠️  BOUNDED: $file_path has $line_count lines (max 300). Extract to sub-modules before commit." >&2
      fi
      if [[ "$file_path" =~ \.(ts|tsx|js|jsx)$ ]] && [[ ! "$file_path" =~ \.(test|spec)\. ]] && [[ ! "$file_path" =~ /scripts/ ]]; then
        grep -q 'console\.\(log\|debug\)' "$file_path" && echo "⚠️  console.log in $file_path — use structured logger" >&2
        grep -nE '^[^/]*:\s*any\b|\bas\s+any\b' "$file_path" >/dev/null 2>&1 && echo "⚠️  'any' type in $file_path — prefer 'unknown' + narrowing" >&2
      fi
      exit 0

  - name: prompt-guard
    trigger: user-prompt-submit
    description: "Intercept prompts with destructive or structural signals; inject sentinel reminder"
    filename: prompt-guard.sh
    script: |
      #!/usr/bin/env bash
      # prompt-guard: runs on every user prompt (UserPromptSubmit).
      # Two jobs:
      #   1. Detect Tier 2/3 operation signals -> remind about operation-classification.md.
      #   2. Detect structural task signals -> remind to read the sentinel first.
      set -u
      input=$(cat)
      if command -v jq >/dev/null 2>&1; then
        user_prompt=$(echo "$input" | jq -r '.prompt // empty')
      else
        user_prompt=$(echo "$input" | grep -o '"prompt":"[^"]*"' | cut -d'"' -f4 | head -1)
      fi
      lower=$(echo "$user_prompt" | tr '[:upper:]' '[:lower:]')
      sensitive_signals=("drop table" "truncate" "delete from" "force push" "full resync"
        "backfill" "reset db" "disable rls" "service role" "bypass auth"
        "rm -rf" "drop database" "wipe data")
      for signal in "${sensitive_signals[@]}"; do
        if [[ "$lower" == *"$signal"* ]]; then
          printf "🧭 prompt-guard: destructive signal detected (\"%s\").\n" "$signal"
          printf "   Before executing:\n"
          printf "   1. Check docs/operation-classification.md -- classify the operation (Tier 0-3).\n"
          printf "   2. If Tier 2+: confirm with the user before proceeding.\n"
          printf "   3. If Tier 3: require FORGECRAFT_ALLOW_DESTRUCTIVE=1 override + ADR.\n"
          break
        fi
      done
      structural_signals=("create a new" "add a new" "refactor" "migrate" "new feature"
        "new endpoint" "new module" "change architecture" "add table" "add column"
        "new component" "new service" "new repository")
      for signal in "${structural_signals[@]}"; do
        if [[ "$lower" == *"$signal"* ]]; then
          printf "🧭 prompt-guard: structural task detected (\"%s\").\n" "$signal"
          printf "   Before coding:\n"
          printf "   1. Read CLAUDE.md (sentinel) -- architecture rules and prohibited ops.\n"
          printf "   2. Read the relevant section of docs/PRD.md or use-cases.md.\n"
          printf "   3. If decision is non-trivial -> propose an ADR before implementing.\n"
          printf "   4. If the change spans > 3 files -> propose a brief plan first.\n"
          break
        fi
      done
      exit 0
