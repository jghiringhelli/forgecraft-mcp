tag: EXPO
section: hooks
hooks:
  - name: expo-doctor
    trigger: pre-commit
    description: "Run expo-doctor on Expo projects — catches SDK/dependency mismatches and invalid app config before they fail an EAS Build."
    filename: pre-commit-expo-doctor.sh
    script: |
      #!/bin/bash
      # Pre-Commit Hook: Expo Doctor
      # Runs `npx expo-doctor` so config/dependency problems surface at commit
      # time, not at EAS Build time. No-ops when this is not an Expo project.
      _fc_write_violation() {
        local hook_name="$1" severity="${2:-error}" message="$3"
        local repo_root; repo_root="$(git rev-parse --show-toplevel 2>/dev/null)" || return 0
        local dir="$repo_root/.forgecraft"; mkdir -p "$dir" 2>/dev/null || return 0
        local ts; ts="$(date -u +"%Y-%m-%dT%H:%M:%SZ" 2>/dev/null || printf "unknown")"
        local esc_msg; esc_msg="$(printf '%s' "$message" | sed 's/\\/\\\\/g; s/"/\\"/g')"
        printf '{"hook":"%s","severity":"%s","message":"%s","timestamp":"%s"}\n' \
          "$hook_name" "$severity" "$esc_msg" "$ts" >> "$dir/gate-violations.jsonl" 2>/dev/null || true
      }
      # Only relevant for Expo projects — detect the expo dependency.
      if [ ! -f "package.json" ] || ! grep -q '"expo"' package.json; then
        exit 0
      fi
      # Only run when JS/TS or app config changed (skip doc-only commits).
      CHANGED=$(git diff --cached --name-only --diff-filter=ACM | grep -E '\.(ts|tsx|js|jsx|json)$|app\.config\.(js|ts)$')
      [ -z "$CHANGED" ] && exit 0
      if ! command -v npx &>/dev/null; then
        echo "  ⊘ npx not found — skipping expo-doctor"
        exit 0
      fi
      echo "🩺 Running expo-doctor..."
      if npx --no-install expo-doctor 2>&1; then
        echo "  ✅ expo-doctor passed"
        exit 0
      fi
      echo "❌ expo-doctor reported problems — fix before commit (or document an exception)."
      _fc_write_violation "pre-commit-expo-doctor" "error" "expo-doctor reported configuration/dependency problems"
      exit 1
