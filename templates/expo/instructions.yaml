tag: EXPO
section: instructions
blocks:
  - id: expo-build-release
    tier: recommended
    title: "Expo — EAS Build, Submit & Update (OTA)"
    content: |
      ## Expo — Build, Submit & Over-the-Air Updates

      This project uses the Expo managed workflow. CI/CD is **EAS**, not Docker/Vercel.

      - **EAS Build** produces the native binaries. Define every build profile in `eas.json` (`development`, `preview`, `production`). Never hand-edit `ios/`/`android/` in the managed workflow — they are generated by **prebuild** (`npx expo prebuild`) and your changes will be lost. Put native config in `app.json`/`app.config.ts` and config plugins instead.
      - **EAS Submit** ships builds to the stores (`eas submit -p ios|android`). Internal distribution (TestFlight / Play Internal) is the staging tier; store review is the production gate.
      - **EAS Update** delivers OTA JS/asset updates without a store submission. An OTA update can only ship JS and assets — **any change to native code, SDK version, or a config plugin requires a new EAS Build**, not an update. Match `runtimeVersion` policy in `app.json` so updates only reach compatible binaries.
      - Pin the Expo SDK and run `npx expo install <pkg>` (not bare `npm install`) so dependency versions stay compatible with the SDK. Bumping the SDK is a build-and-resubmit event — record it in an ADR.
      - Secrets: use EAS environment variables / EAS Secrets for build-time values. `EXPO_PUBLIC_*` vars are **inlined into the client bundle** — never put a real secret behind that prefix.

  - id: expo-project-conventions
    tier: recommended
    title: "Expo — Project Conventions"
    content: |
      ## Expo — Project Conventions

      - Routing: with `expo-router`, the filesystem under `app/` **is** the route map — a file is a screen, `_layout.tsx` defines the navigator. Keep route files thin; push logic into hooks/services.
      - Config lives in `app.json` / `app.config.ts` (dynamic). Required permissions, deep-link scheme, and config plugins all belong there — not in edited native projects.
      - On-device storage: prefer `expo-sqlite` (optionally with Drizzle) for relational data and `expo-secure-store` for tokens/secrets. Do not store secrets in `AsyncStorage`.
      - Run `npx expo-doctor` before every push (a pre-commit hook is installed) — it catches SDK/dependency mismatches and invalid config that only surface at build time otherwise.
      - Testing: use the `jest-expo` preset with `@testing-library/react-native`; for E2E use Maestro or Detox against a dev build. Plain `jest`/`vitest` presets do not handle the RN/Expo transform.
