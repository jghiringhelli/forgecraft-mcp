name: Publish

# Requires NPM_TOKEN secret set to an "Automation" token from npmjs.com.
# Automation tokens bypass 2FA — create one at:
#   npmjs.com → Account → Access Tokens → Generate New Token → Automation
# Then add it at:
#   GitHub repo → Settings → Secrets and variables → Actions → NPM_TOKEN

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Test + coverage
        run: npm run test:coverage

      - name: Build
        run: npm run build

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
