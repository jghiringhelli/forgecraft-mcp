ue, twoM, [...sources, ...tests]);\n    expect(result.evidence.some((e) => e.includes(\"50%\"))).toBe(true);\n    expect(result.evidence.every((e) => !e.includes(\"150%\"))).toBe(true);\n  });\n\n  it(\"test files are excluded from sourceCount (not double-counted as source)\", () => {\n    // 4 source files, 1 missing = 25% → score 1\n    // If test files counted as source: 4+1=5 files, 1 missing = 20% → score 2\n    // Kills BooleanLiteral L24: !isTestOrFixtureFile(f) → !false\n    const sources = [\"src/a.ts\", \"src/b.ts\", \"src/c.ts\", \"src/d.ts\"];\n    const oneTest = [\"tests/a.test.ts\"];\n    const oneM = [missing(\"src/d.ts\", \"tests/d.test.ts\")];\n    const result = scoreVerifiable(true, oneM, [...sources, ...oneTest]);\n    expect(result.score).toBe(1);\n  });\n});\n"},"tests/analyzers/scorers/composable-scorer.test.ts":{"tests":[{"id":"85","name":"score 0 — no layers returns score 0 when src is empty"},{"id":"86","name":"score 1 — service layer only returns score 1 with src/services/"},{"id":"87","name":"score 1 — service layer only returns score 1 with src/tools/ (CLI pattern)"},{"id":"88","name":"score 1 — service layer only returns score 1 with src/handlers/"},{"id":"89","name":"score 2 — service + repository layers returns score 2 with src/services/ + src/repositories/"},{"id":"90","name":"score 2 — service + repository layers returns score 2 with src/tools/ + src/registry/ (MCP pattern)"},{"id":"91","name":"score 2 — service + repository layers reports interface files in evidence when present"},{"id":"92","name":"score 2 — service + repository layers notes partial credit when no interface files"},{"id":"93","name":"score 2 — service + repository layers works without src/ — root-level services/"},{"id":"94","name":"interface detection — singular directory names detects interface/ (singular) as interface layer"},{"id":"95","name":"interface detection — singular directory names detects contract/ (singular) as interface layer"},{"id":"96","name":"interface detection — singular directory names detects port/ (singular) as interface layer"},{"id":"97","name":"interface detection — singular directory names detects type/ (singular) as interface layer"},{"id":"98","name":"interface detection — singular directory names non-source file matching interface dir does not count"},{"id":"99","name":"score 0 — evidence content evidence describes missing layers"}],"source":"import { describe, it, expect, beforeEach, afterEach } from \"vitest\";\nimport { mkdtempSync, mkdirSync, rmSync } from \"node:fs\";\nimport { join } from \"node:path\";\nimport { tmpdir } from \"node:os\";\nimport { scoreComposable } from \"../../../src/analyzers/scorers/composable-scorer.js\";\n\nlet dir: string;\n\nbeforeEach(() => { dir = mkdtempSync(join(tmpdir(), \"fc-comp-\")); });\nafterEach(() => { rmSync(dir, { recursive: true, force: true }); });\n\nfunction mkDir(...parts: string[]) {\n  mkdirSync(join(dir, ...parts), { recursive: true });\n}\n\nconst withInterface = [\"src/shared/types/index.ts\"];\nconst withoutInterface: string[] = [];\n\ndescribe(\"score 0 — no layers\", () => {\n  it(\"returns score 0 when src is empty\", () => {\n    mkDir(\"src\");\n    const result = scoreComposable(dir, withoutInterface);\n    expect(result.score).toBe(0);\n    expect(result.property).toBe(\"composable\");\n  });\n});\n\ndescribe(\"score 1 — service layer only\", () => {\n  it(\"returns score 1 with src/services/\", () => {\n    mkDir(\"src\", \"services\");\n    const result = scoreComposable(dir, withoutInterface);\n    expect(result.score).toBe(1);\n    expect(result.evidence[0]).toMatch(/Service layer found/);\n  });\n\n  it(\"returns score 1 with src/tools/ (CLI pattern)\", () => {\n    mkDir(\"src\", \"tools\");\n    const result = scoreComposable(dir, withoutInterface);\n    expect(result.score).toBe(1);\n  });\n\n  it(\"returns score 1 with src/handlers/\", () => {\n    mkDir(\"src\", \"handlers\");\n    const result = scoreComposable(dir, withoutInterface);\n    expect(result.score).toBe(1);\n  });\n});\n\ndescribe(\"score 2 — service + repository layers\", () => {\n  it(\"returns score 2 with src/services/ + src/repositories/\", () => {\n    mkDir(\"src\", \"services\");\n    mkDir(\"src\", \"repositories\");\n    const result = scoreComposable(dir, withoutInterface);\n    expect(result.score).toBe(2);\n    expect(result.evidence[0]).toMatch(/Service layer/);\n    expect(result.evidence[1]).toMatch(/Repository layer/);\n  });\n\n  it(\"returns score 2 with src/tools/ + src/registry/ (MCP pattern)\", () => {\n    mkDir(\"src\", \"tools\");\n    mkDir(\"src\", \"registry\");\n    const result = scoreComposable(dir, withoutInterface);\n    expect(result.score).toBe(2);\n  });\n\n  it(\"reports interface files in evidence when present\", () => {\n    mkDir(\"src\", \"services\");\n    mkDir(\"src\", \"repositories\");\n    const result = scoreComposable(dir, withInterface);\n    expect(result.evidence[2]).toMatch(/Interface\\/contract files detected/);\n  });\n\n  it(\"notes partial credit when no interface files\", () => {\n    mkDir(\"src\", \"services\");\n    mkDir(\"src\", \"repositories\");\n    const result = scoreComposable(dir, withoutInterface);\n    expect(result.evidence[2]).toMatch(/partial credit/);\n  });\n\n  it(\"works without src/ — root-level services/\", () => {\n    mkDir(\"services\");\n    mkDir(\"repositories\");\n    const result = scoreComposable(dir, withoutInterface);\n    expect(result.score).toBe(2);\n  });\n});\n\ndescribe(\"interface detection — singular directory names\", () => {\n  it(\"detects interface/ (singular) as interface layer\", () => {\n    // Kills Regex: interfaces? → interfaces (singular 'interface/' would stop matching)\n    mkDir(\"src\", \"services\");\n    mkDir(\"src\", \"repositories\");\n    const result = scoreComposable(dir, [\"src/interface/IUserRepo.ts\"]);\n    expect(result.evidence[2]).toMatch(/Interface\\/contract files detected/);\n  });\n\n  it(\"detects contract/ (singular) as interface layer\", () => {\n    // Kills Regex: contracts? → contracts\n    mkDir(\"src\", \"services\");\n    mkDir(\"src\", \"repositories\");\n    const result = scoreComposable(dir, [\"src/contract/UserContract.ts\"]);\n    expect(result.evidence[2]).toMatch(/Interface\\/contract files detected/);\n  });\n\n  it(\"detects port/ (singular) as interface layer\", () => {\n    // Kills Regex: ports? → ports\n    mkDir(\"src\", \"services\");\n    mkDir(\"src\", \"repositories\");\n    const result = scoreComposable(dir, [\"src/port/UserPort.ts\"]);\n    expect(result.evidence[2]).toMatch(/Interface\\/contract files detected/);\n  });\n\n  it(\"detects type/ (singular) as interface layer\", () => {\n    // Kills Regex: types? → types\n    mkDir(\"src\", \"services\");\n    mkDir(\"src\", \"repositories\");\n    const result = scoreComposable(dir, [\"src/type/UserType.ts\"]);\n    expect(result.evidence[2]).toMatch(/Interface\\/contract files detected/);\n  });\n\n  it(\"non-source file matching interface dir does not count\", () => {\n    // Kills LogicalOperator L37: && → || (regex match alone would qualify)\n    mkDir(\"src\", \"services\");\n    mkDir(\"src\", \"repositories\");\n    const result = scoreComposable(dir, [\"src/interfaces/schema.json\"]);\n    expect(result.evidence[2]).toMatch(/partial credit/);\n  });\n});\n\ndescribe(\"score 0 — evidence content\", () => {\n  it(\"evidence describes missing layers\", () => {\n    // Kills ArrayDeclaration L58: [] would produce empty evidence\n    mkDir(\"src\");\n    const result = scoreComposable(dir, withoutInterface);\n    expect(result.score).toBe(0);\n    expect(result.evidence[0]).toMatch(/No service layer/);\n    expect(result.evidence[1]).toMatch(/No repository layer/);\n  });\n});\n"},"tests/registry/sentinel-renderer.test.ts":{"tests":[{"id":"100","name":"renderSentinelTree — structure returns_claude_md_as_first_file"},{"id":"101","name":"renderSentinelTree — structure claude_md_is_sentinel_not_monolithic"},{"id":"102","name":"renderSentinelTree — structure empty_blocks_returns_only_claude_md_with_no_domain_files"},{"id":"103","name":"renderSentinelTree — structure produces_separate_domain_file_per_domain"},{"id":"104","name":"renderSentinelTree — structure domain_file_paths_match_pattern"},{"id":"105","name":"renderSentinelTree — structure unknown_block_ids_route_to_protocols_not_discarded"},{"id":"106","name":"renderSentinelTree — CLAUDE.md content claude_md_is_sentinel_not_monolithic"},{"id":"107","name":"renderSentinelTree — CLAUDE.md content empty_blocks_returns_only_claude_md_with_no_domain_files"},{"id":"108","name":"renderSentinelTree — CLAUDE.md content contains_project_name_as_h1_title"},{"id":"109","name":"renderSentinelTree — CLAUDE.md content contains_navigation_pointer_to_index_md"},{"id":"110","name":"renderSentinelTree — CLAUDE.md content claude_md_does_not_contain_wayfinding_table"},{"id":"111","name":"renderSentinelTree — CLAUDE.md content uses_tag_names_in_description_when_no_domain_set"},{"id":"112","name":"renderSentinelTree — CLAUDE.md content universal_tag_is_excluded_from_description"},{"id":"113","name":"renderSentinelTree — CLAUDE.md content fallback_comment_when_no_tags_and_no_domain"},{"id":"114","name":"renderSentinelTree — CLAUDE.md content uses_domain_in_description_when_domain_is_set"},{"id":"115","name":"renderSentinelTree — domain file content domain_file_contains_forgecraft_sentinel_comment"},{"id":"116","name":"renderSentinelTree — domain file content domain_file_contains_rendered_block_content"},{"id":"117","name":"renderSentinelTree — domain file content domain_file_only_contains_its_own_domain_blocks"},{"id":"118","name":"renderSentinelTree — domain file content block_content_is_trimmed_before_inclusion_in_domain_file"},{"id":"119","name":"renderSentinelTree — domain file content empty_block_content_is_not_added_to_domain_file"},{"id":"120","name":"renderSentinelTree — domain file content unknown_domain_description_falls_back_to_domain_name"}],"source":"/**\r\n * Tests for the sentinel tree renderer.\r\n *\r\n * Designed to be mutation-resistant: every assertion checks specific content,\r\n * not just existence. Verified against Stryker mutation score ≥ 80%.\r\n */\r\n\r\nimport { describe, it, expect } from \"vitest\";\r\nimport {\r\n  renderSentinelTree,\r\n  type SentinelFile,\r\n} from \"../../src/registry/sentinel-renderer.js\";\r\nimport type { InstructionBlock } from \"../../src/shared/types.js\";\r\nimport type { RenderContext } from \"../../src/registry/renderer.js\";\r\n\r\n// ── Fixtures ────────────────────────────────────────────────────────────\r\n\r\nconst context: RenderContext = {\r\n  projectName: \"TestProject\",\r\n  language: \"typescript\",\r\n  repoUrl: \"https://github.com/test/test\",\r\n  framework: \"none\",\r\n  domain: \"none\",\r\n  sensitiveData: \"NO\",\r\n  tags: [\"UNIVERSAL\", \"API\"],\r\n  releasePhase: \"staging\",\r\n};\r\n\r\n/** Minimal helper to build an InstructionBlock for tests. */\r\nfunction makeBlock(id: string, title: string, content: string): InstructionBlock {\r\n  return { id, title, content };\r\n}\r\n\r\nconst architectureBlock = makeBlock(\r\n  \"production-code-standards\",\r\n  \"Production Code Standards\",\r\n  \"## Production Code Standards\\nAll config via env vars. No mocks in production.\",\r\n);\r\n\r\nconst testingBlock = makeBlock(\r\n  \"testing-pyramid\",\r\n  \"Testing Pyramid\",\r\n  \"## Testing Pyramid\\nUnit → integration → E2E. 80% coverage minimum.\",\r\n);\r\n\r\nconst unknownBlock = makeBlock(\r\n  \"unknown-xyz-block\",\r\n  \"Unknown Block\",\r\n  \"## Unknown\\nSome protocol content here.\",\r\n);\r\n\r\n// ── Helpers ─────────────────────────────────────────────────────────────\r\n\r\nfunction getFile(files: SentinelFile[], path: string): SentinelFile {\r\n  const found = files.find((f) => f.relativePath === path);\r\n  if (!found) throw new Error(`File not found in output: ${path}`);\r\n  return found;\r\n}\r\n\r\nfunction claudeMd(files: SentinelFile[]): SentinelFile {\r\n  return getFile(files, \"CLAUDE.md\");\r\n}\r\n\r\n// ── Structure tests ──────────────────────────────────────────────────────\r\n\r\ndescribe(\"renderSentinelTree — structure\", () => {\r\n  it(\"returns_claude_md_as_first_file\", () => {\r\n    const files = renderSentinelTree([architectureBlock], context);\r\n    expect(files[0]!.relativePath).toBe(\"CLAUDE.md\");\r\n  });\r\n\r\n  it(\"claude_md_is_sentinel_not_monolithic\", () => {\r\n    const files = renderSentinelTree([architectureBlock], context);\r\n    const { content } = claudeMd(files);\r\n    // CNT root is ≤10 lines — pointer only, no rules\r\n    expect(content.split(\"\\n\").length).toBeLessThan(10);\r\n    expect(content).toContain(\"ForgeCraft sentinel\");\r\n  });\r\n\r\n  it(\"empty_blocks_returns_only_claude_md_with_no_domain_files\", () => {\r\n    const files = renderSentinelTree([], context);\r\n    expect(files).toHaveLength(1);\r\n    expect(files[0]!.relativePath).toBe(\"CLAUDE.md\");\r\n    // Wayfinding moved to .claude/index.md — CLAUDE.md must not list domain files\r\n    const { content } = claudeMd(files);\r\n    expect(content).not.toContain(\".claude/standards/architecture.md\");\r\n  });\r\n\r\n  it(\"produces_separate_domain_file_per_domain\", () => {\r\n    const files = renderSentinelTree([architectureBlock, testingBlock], context);\r\n    const paths = files.map((f) => f.relativePath);\r\n    expect(paths).toContain(\".claude/standards/architecture.md\");\r\n    expect(paths).toContain(\".claude/standards/testing.md\");\r\n    // The two domains should be separate files, not merged\r\n    expect(paths.filter((p) => p.includes(\"architecture\")).length).toBe(1);\r\n    expect(paths.filter((p) => p.includes(\"testing\")).length).toBe(1);\r\n  });\r\n\r\n  it(\"domain_file_paths_match_pattern\", () => {\r\n    const files = renderSentinelTree([architectureBlock, testingBlock], context);\r\n    const domainFiles = files.filter((f) => f.relativePath !== \"CLAUDE.md\");\r\n    expect(domainFiles.length).toBeGreaterThan(0);\r\n    for (const file of domainFiles) {\r\n      expect(file.relativePath).toMatch(/^\\.claude\\/standards\\/[^/]+\\.md$/);\r\n    }\r\n  });\r\n\r\n  it(\"unknown_block_ids_route_to_protocols_not_discarded\", () => {\r\n    const files = renderSentinelTree([unknownBlock], context);\r\n    const paths = files.map((f) => f.relativePath);\r\n    // Must produce protocols.md (not silently drop the block)\r\n    expect(paths).toContain(\".claude/standards/protocols.md\");\r\n    // The block content must appear in protocols.md\r\n    const protocolsFile = getFile(files, \".claude/standards/protocols.md\");\r\n    expect(protocolsFile.content).toContain(\"Some protocol content here\");\r\n  });\r\n});\r\n\r\n// ── CLAUDE.md content tests ──────────────────────────────────────────────\r\n\r\ndescribe(\"renderSentinelTree — CLAUDE.md content\", () => {\r\n  it(\"claude_md_is_sentinel_not_monolithic\", () => {\r\n    const files = renderSentinelTree([architectureBlock], context);\r\n    const { content } = claudeMd(files);\r\n    // CNT root is ≤10 lines — pointer only, no rules\r\n    expect(content.split(\"\\n\").length).toBeLessThan(10);\r\n    expect(content).toContain(\"ForgeCraft sentinel\");\r\n  });\r\n\r\n  it(\"empty_blocks_returns_only_claude_md_with_no_domain_files\", () => {\r\n    const files = renderSentinelTree([], context);\r\n    expect(files).toHaveLength(1);\r\n    expect(files[0]!.relativePath).toBe(\"CLAUDE.md\");\r\n    // Wayfinding moved to .claude/index.md — CLAUDE.md must not list domain files\r\n    const { content } = claudeMd(files);\r\n    expect(content).not.toContain(\".claude/standards/architecture.md\");\r\n  });\r\n\r\n  it(\"contains_project_name_as_h1_title\", () => {\r\n    const files = renderSentinelTree([architectureBlock], context);\r\n    const { content } = claudeMd(files);\r\n    expect(content).toContain(`# ${context.projectName}`);\r\n  });\r\n\r\n  it(\"contains_navigation_pointer_to_index_md\", () => {\r\n    const files = renderSentinelTree([architectureBlock], context);\r\n    const { content } = claudeMd(files);\r\n    expect(content).toContain(\".claude/index.md\");\r\n    expect(content).toContain(\"Navigate to the relevant branch\");\r\n  });\r\n\r\n  it(\"claude_md_does_not_contain_wayfinding_table\", () => {\r\n    const files = renderSentinelTree([architectureBlock, testingBlock], context);\r\n    const { content } = claudeMd(files);\r\n    // Wayfinding is now in .claude/index.md, not CLAUDE.md\r\n    expect(content).not.toContain(\".claude/standards/architecture.md\");\r\n    expect(content).not.toContain(\".claude/standards/testing.md\");\r\n  });\r\n\r\n  it(\"uses_tag_names_in_description_when_no_domain_set\", () => {\r\n    // context has domain: \"none\" and tags [\"UNIVERSAL\", \"API\"]\r\n    const files = renderSentinelTree([architectureBlock], context);\r\n    const { content } = claudeMd(files);\r\n    // \"API\" tag (non-universal) should appear lowercased in description\r\n    expect(content).toContain(\"api\");\r\n  });\r\n\r\n  it(\"universal_tag_is_excluded_from_description\", () => {\r\n    // Kills ConditionalExpression L170 and MethodExpression L170:\r\n    // filter always-true keeps \"UNIVERSAL\" → appears in description\r\n    // filter removed (MethodExpression) → same issue\r\n    const files = renderSentinelTree([architectureBlock], context);\r\n    const { content } = claudeMd(files);\r\n    expect(content.toLowerCase()).not.toContain(\"universal\");\r\n  });\r\n\r\n  it(\"fallback_comment_when_no_tags_and_no_domain\", () => {\r\n    // Kills EqualityOperator L174 (>0 → >=0) and ConditionalExpression L174 (always true)\r\n    // With either mutation, tag-based description fires even with empty tag list\r\n    const noTagCtx: RenderContext = { ...context, tags: [], domain: \"none\" };\r\n    const files = renderSentinelTree([architectureBlock], noTagCtx);\r\n    const { content } = claudeMd(files);\r\n    expect(content).toContain(\"FILL:\");\r\n  });\r\n\r\n  it(\"uses_domain_in_description_when_domain_is_set\", () => {\r\n    const domainContext: RenderContext = {\r\n      ...context,\r\n      domain: \"financial technology\",\r\n    };\r\n    const files = renderSentinelTree([architectureBlock], domainContext);\r\n    const { content } = claudeMd(files);\r\n    expect(content).toContain(\"financial technology\");\r\n  });\r\n});\r\n\r\n// ── Domain file content tests ────────────────────────────────────────────\r\n\r\ndescribe(\"renderSentinelTree — domain file content\", () => {\r\n  it(\"domain_file_contains_forgecraft_sentinel_comment\", () => {\r\n    const files = renderSentinelTree([architectureBlock], context);\r\n    const archFile = getFile(files, \".claude/standards/architecture.md\");\r\n    expect(archFile.content).toContain(\"ForgeCraft sentinel:\");\r\n    expect(archFile.content).toContain(\"architecture\");\r\n  });\r\n\r\n  it(\"domain_file_contains_rendered_block_content\", () => {\r\n    const files = renderSentinelTree([architectureBlock], context);\r\n    const archFile = getFile(files, \".claude/standards/architecture.md\");\r\n    // The actual block content must be in the file, not just the header\r\n    expect(archFile.content).toContain(\"All config via env vars\");\r\n    expect(archFile.content).toContain(\"No mocks in production\");\r\n  });\r\n\r\n  it(\"domain_file_only_contains_its_own_domain_blocks\", () => {\r\n    const files = renderSentinelTree([architectureBlock, testingBlock], context);\r\n    const archFile = getFile(files, \".claude/standards/architecture.md\");\r\n    const testFile = getFile(files, \".claude/standards/testing.md\");\r\n    // Architecture content in architecture file, not testing file\r\n    expect(archFile.content).toContain(\"All config via env vars\");\r\n    expect(testFile.content).not.toContain(\"All config via env vars\");\r\n    // Testing content in testing file, not architecture file\r\n    expect(testFile.content).toContain(\"80% coverage minimum\");\r\n    expect(archFile.content).not.toContain(\"80% coverage minimum\");\r\n  });\r\n\r\n  it(\"block_content_is_trimmed_before_inclusion_in_domain_file\", () => {\r\n    // Content with significant leading/trailing whitespace\r\n    const paddedBlock = makeBlock(\r\n      \"production-code-standards\",\r\n      \"SOLID\",\r\n      \"\\n\\n   ## Trimmed Rule\\nActual content here.   \\n\\n\\n\",\r\n    );\r\n    const files = renderSentinelTree([paddedBlock], context);\r\n    const archFile = getFile(files, \".claude/standards/architecture.md\");\r\n    const contentLines = archFile.content\r\n      .split(\"\\n\")\r\n      .filter((l) => !l.startsWith(\"<"+"!--\") && l !== \"\");\r\n    // First non-header line must not start with whitespace (trim() was applied)\r\n    expect(contentLines[0]).toBe(\"## Trimmed Rule\");\r\n  });\r\n\r\n  it(\"empty_block_content_is_not_added_to_domain_file\", () => {\r\n    // Kills ConditionalExpression L127: if (rendered) → if (true)\r\n    // With mutation, two empty strings get pushed, adding 2 extra lines to the file.\r\n    // \"production-code-standards\" maps to \"architecture\" domain.\r\n    const emptyBlock = makeBlock(\"production-code-standards\", \"SOLID\", \"   \\n  \\n  \");\r\n    const files = renderSentinelTree([emptyBlock], context);\r\n    const archFile = getFile(files, \".claude/standards/architecture.md\");\r\n    const lineCount = archFile.content.split(\"\\n\").length;\r\n    expect(lineCount).toBeLessThanOrEqual(3);\r\n  });\r\n\r\n  it(\"unknown_domain_description_falls_back_to_domain_name\", () => {\r\n    // Use a block ID that maps to a domain not in DOMAIN_DESCRIPTIONS — we simulate\r\n    // this by testing via \"protocols\" which has a description, verifying that the\r\n    // block is correctly routed and its domain file is produced.\r\n    const protocolBlock = makeBlock(\r\n      \"clarification-protocol\",\r\n      \"Clarification\",\r\n      \"## Clarification\\nAsk before assuming.\",\r\n    );\r\n    const files = renderSentinelTree([protocolBlock], context);\r\n    // The protocols.md file must be produced (domain routing works)\r\n    const protocolsFile = files.find((f) =>\r\n      f.relativePath.includes(\"protocols.md\"),\r\n    );\r\n    expect(protocolsFile).toBeDefined();\r\n    // The domain file content must contain the rendered block\r\n    expect(protocolsFile!.content).toContain(\"Ask before assuming\");\r\n    // Wayfinding is now in .claude/index.md, not CLAUDE.md\r\n    const { content } = claudeMd(files);\r\n    expect(content).not.toContain(\"protocols.md\");\r\n  });\r\n});\r\n\r\n\r\n"},"tests/analyzers/scorers/defended-scorer.test.ts":{"tests":[{"id":"121","name":"score 0 — no hooks, no lint returns score 0 when directory is empty"},{"id":"122","name":"score 1 — lint only returns score 1 with eslint.config.js"},{"id":"123","name":"score 1 — lint only returns score 1 for lint config .eslintrc.js"},{"id":"124","name":"score 1 — lint only returns score 1 for lint config .eslintrc.json"},{"id":"125","name":"score 1 — lint only returns score 1 for lint config .pylintrc"},{"id":"126","name":"score 1 — lint only returns score 1 for lint config pyproject.toml"},{"id":"127","name":"score 1 — lint only returns score 1 for lint config biome.json"},{"id":"128","name":"score 2 — pre-commit hook present returns score 2 with .git/hooks/pre-commit"},{"id":"129","name":"score 2 — pre-commit hook present returns score 2 with .husky/pre-commit"},{"id":"130","name":"score 2 — pre-commit hook present includes lint note when lint config also present"},{"id":"131","name":"score 2 — pre-commit hook present notes missing lint when no lint config"}],"source":"import { describe, it, expect, beforeEach, afterEach } from \"vitest\";\nimport { mkdtempSync, mkdirSync, writeFileSync, rmSync } from \"node:fs\";\nimport { join } from \"node:path\";\nimport { tmpdir } from \"node:os\";\nimport { scoreDefended } from \"../../../src/analyzers/scorers/defended-scorer.js\";\n\nlet dir: string;\n\nbeforeEach(() => { dir = mkdtempSync(join(tmpdir(), \"fc-def-\")); });\nafterEach(() => { rmSync(dir, { recursive: true, force: true }); });\n\nfunction mkGitHook() {\n  const hooksDir = join(dir, \".git\", \"hooks\");\n  mkdirSync(hooksDir, { recursive: true });\n  writeFileSync(join(hooksDir, \"pre-commit\"), \"#!/bin/sh\\nexit 0\", \"utf-8\");\n}\n\nfunction mkHuskyHook() {\n  const huskyDir = join(dir, \".husky\");\n  mkdirSync(huskyDir, { recursive: true });\n  writeFileSync(join(huskyDir, \"pre-commit\"), \"#!/bin/sh\\nnpx lint-staged\", \"utf-8\");\n}\n\nfunction mkLintConfig(name = \"eslint.config.js\") {\n  writeFileSync(join(dir, name), \"export default []\", \"utf-8\");\n}\n\ndescribe(\"score 0 — no hooks, no lint\", () => {\n  it(\"returns score 0 when directory is empty\", () => {\n    const result = scoreDefended(dir);\n    expect(result.score).toBe(0);\n    expect(result.property).toBe(\"defended\");\n    expect(result.evidence[0]).toMatch(/No pre-commit hook/);\n  });\n});\n\ndescribe(\"score 1 — lint only\", () => {\n  it(\"returns score 1 with eslint.config.js\", () => {\n    mkLintConfig(\"eslint.config.js\");\n    const result = scoreDefended(dir);\n    expect(result.score).toBe(1);\n    expect(result.evidence[0]).toMatch(/Lint configuration present/);\n    expect(result.evidence[1]).toMatch(/pre-commit hook/);\n  });\n\n  it.each([\".eslintrc.js\", \".eslintrc.json\", \".pylintrc\", \"pyproject.toml\", \"biome.json\"])(\n    \"returns score 1 for lint config %s\",\n    (cfg) => {\n      mkLintConfig(cfg);\n      expect(scoreDefended(dir).score).toBe(1);\n    },\n  );\n});\n\ndescribe(\"score 2 — pre-commit hook present\", () => {\n  it(\"returns score 2 with .git/hooks/pre-commit\", () => {\n    mkGitHook();\n    const result = scoreDefended(dir);\n    expect(result.score).toBe(2);\n    expect(result.evidence[0]).toMatch(/pre-commit/);\n  });\n\n  it(\"returns score 2 with .husky/pre-commit\", () => {\n    mkHuskyHook();\n    const result = scoreDefended(dir);\n    expect(result.score).toBe(2);\n    expect(result.evidence[0]).toMatch(/\\.husky\\/pre-commit/);\n  });\n\n  it(\"includes lint note when lint config also present\", () => {\n    mkGitHook();\n    mkLintConfig();\n    const result = scoreDefended(dir);\n    expect(result.score).toBe(2);\n    expect(result.evidence[1]).toMatch(/Lint configuration present/);\n  });\n\n  it(\"notes missing lint when no lint config\", () => {\n    mkGitHook();\n    const result = scoreDefended(dir);\n    expect(result.score).toBe(2);\n    expect(result.evidence[1]).toMatch(/No lint config/);\n  });\n});\n"},"tests/analyzers/scorers/auditable-scorer.test.ts":{"tests":[{"id":"132","name":"score 0 — nothing present returns score 0 when project is empty"},{"id":"133","name":"score 1 — partial signals returns score 1 with only Status.md"},{"id":"134","name":"score 1 — partial signals returns score 1 with only CHANGELOG.md"},{"id":"135","name":"score 1 — partial signals returns score 1 with only ADRs"},{"id":"136","name":"score 1 — partial signals returns score 1 with only commit config"},{"id":"137","name":"score 1 — partial signals returns score 1 with ADRs + Status but no commit config"},{"id":"138","name":"score 2 — all three signals returns score 2 with ADRs + Status + commit config"},{"id":"139","name":"score 2 — all three signals counts multiple ADR files in evidence"},{"id":"140","name":"score 2 — all three signals accepts .husky/commit-msg as commit config"},{"id":"141","name":"score 2 — all three signals recognises docs/decisions/ as ADR directory"},{"id":"142","name":"score 2 — all three signals recognises docs/adr/ (singular) as ADR directory"},{"id":"143","name":"score 2 — all three signals recognises docs/decision/ (singular) as ADR directory"},{"id":"144","name":"score 2 — all three signals recognises docs/rfc/ (singular) as ADR directory"},{"id":"145","name":"evidence content — partial signals absent items appear under Missing: label, not Present:"},{"id":"146","name":"evidence content — partial signals non-ADR markdown files do not inflate ADR count"}],"source":"import { describe, it, expect, beforeEach, afterEach } from \"vitest\";\nimport { mkdtempSync, mkdirSync, writeFileSync, rmSync } from \"node:fs\";\nimport { join } from \"node:path\";\nimport { tmpdir } from \"node:os\";\nimport { scoreAuditable } from \"../../../src/analyzers/scorers/auditable-scorer.js\";\n\nlet dir: string;\n\nbeforeEach(() => { dir = mkdtempSync(join(tmpdir(), \"fc-aud-\")); });\nafterEach(() => { rmSync(dir, { recursive: true, force: true }); });\n\nfunction mkAdr(name = \"ADR-0001-init.md\") {\n  const d = join(dir, \"docs\", \"adrs\");\n  mkdirSync(d, { recursive: true });\n  writeFileSync(join(d, name), \"# ADR\", \"utf-8\");\n}\n\nfunction mkStatus(name = \"CHANGELOG.md\") {\n  writeFileSync(join(dir, name), \"# Changelog\", \"utf-8\");\n}\n\nfunction mkCommitConfig() {\n  writeFileSync(join(dir, \"commitlint.config.js\"), \"module.exports = {}\", \"utf-8\");\n}\n\nfunction allFiles(): string[] {\n  const adrPath = `docs/adrs/ADR-0001-init.md`;\n  return [adrPath];\n}\n\ndescribe(\"score 0 — nothing present\", () => {\n  it(\"returns score 0 when project is empty\", () => {\n    const result = scoreAuditable(dir, []);\n    expect(result.score).toBe(0);\n    expect(result.property).toBe(\"auditable\");\n    expect(result.evidence[0]).toMatch(/No ADRs/);\n  });\n});\n\ndescribe(\"score 1 — partial signals\", () => {\n  it(\"returns score 1 with only Status.md\", () => {\n    mkStatus(\"Status.md\");\n    const result = scoreAuditable(dir, []);\n    expect(result.score).toBe(1);\n    expect(result.evidence.some((e) => e.includes(\"Status.md\"))).toBe(true);\n    expect(result.evidence.some((e) => e.includes(\"Missing\"))).toBe(true);\n  });\n\n  it(\"returns score 1 with only CHANGELOG.md\", () => {\n    mkStatus(\"CHANGELOG.md\");\n    const result = scoreAuditable(dir, []);\n    expect(result.score).toBe(1);\n  });\n\n  it(\"returns score 1 with only ADRs\", () => {\n    mkAdr();\n    const result = scoreAuditable(dir, allFiles());\n    expect(result.score).toBe(1);\n    expect(result.evidence.some((e) => e.includes(\"ADR\"))).toBe(true);\n  });\n\n  it(\"returns score 1 with only commit config\", () => {\n    mkCommitConfig();\n    const result = scoreAuditable(dir, []);\n    expect(result.score).toBe(1);\n  });\n\n  it(\"returns score 1 with ADRs + Status but no commit config\", () => {\n    mkAdr();\n    mkStatus();\n    const result = scoreAuditable(dir, allFiles());\n    expect(result.score).toBe(1);\n    expect(result.evidence.some((e) => e.includes(\"Missing\"))).toBe(true);\n  });\n});\n\ndescribe(\"score 2 — all three signals\", () => {\n  it(\"returns score 2 with ADRs + Status + commit config\", () => {\n    mkAdr();\n    mkStatus();\n    mkCommitConfig();\n    const result = scoreAuditable(dir, allFiles());\n    expect(result.score).toBe(2);\n    expect(result.evidence[0]).toMatch(/ADR file/);\n    expect(result.evidence[1]).toMatch(/Status\\.md/);\n    expect(result.evidence[2]).toMatch(/commit/i);\n  });\n\n  it(\"counts multiple ADR files in evidence\", () => {\n    mkAdr(\"ADR-0001.md\");\n    mkAdr(\"ADR-0002.md\");\n    mkStatus();\n    mkCommitConfig();\n    const files = [\"docs/adrs/ADR-0001.md\", \"docs/adrs/ADR-0002.md\"];\n    const result = scoreAuditable(dir, files);\n    expect(result.score).toBe(2);\n    expect(result.evidence[0]).toContain(\"2 ADR\");\n  });\n\n  it(\"accepts .husky/commit-msg as commit config\", () => {\n    mkAdr();\n    mkStatus();\n    const huskyDir = join(dir, \".husky\");\n    mkdirSync(huskyDir, { recursive: true });\n    writeFileSync(join(huskyDir, \"commit-msg\"), \"#!/bin/sh\", \"utf-8\");\n    const result = scoreAuditable(dir, allFiles());\n    expect(result.score).toBe(2);\n  });\n\n  it(\"recognises docs/decisions/ as ADR directory\", () => {\n    const d = join(dir, \"docs\", \"decisions\");\n    mkdirSync(d, { recursive: true });\n    writeFileSync(join(d, \"001-init.md\"), \"# Decision\", \"utf-8\");\n    mkStatus();\n    mkCommitConfig();\n    const result = scoreAuditable(dir, [\"docs/decisions/001-init.md\"]);\n    expect(result.score).toBe(2);\n  });\n\n  it(\"recognises docs/adr/ (singular) as ADR directory\", () => {\n    // Kills Regex: adrs? → adrs (singular 'adr/' would stop matching)\n    const d = join(dir, \"docs\", \"adr\");\n    mkdirSync(d, { recursive: true });\n    writeFileSync(join(d, \"0001-init.md\"), \"# ADR\", \"utf-8\");\n    mkStatus();\n    mkCommitConfig();\n    const result = scoreAuditable(dir, [\"docs/adr/0001-init.md\"]);\n    expect(result.score).toBe(2);\n    expect(result.evidence[0]).toMatch(/ADR/);\n  });\n\n  it(\"recognises docs/decision/ (singular) as ADR directory\", () => {\n    // Kills Regex: decisions? → decisions (singular 'decision/' would stop matching)\n    const d = join(dir, \"docs\", \"decision\");\n    mkdirSync(d, { recursive: true });\n    writeFileSync(join(d, \"001.md\"), \"# Decision\", \"utf-8\");\n    mkStatus();\n    mkCommitConfig();\n    const result = scoreAuditable(dir, [\"docs/decision/001.md\"]);\n    expect(result.score).toBe(2);\n  });\n\n  it(\"recognises docs/rfc/ (singular) as ADR directory\", () => {\n    // Kills Regex: rfcs? → rfcs (singular 'rfc/' would stop matching)\n    const d = join(dir, \"docs\", \"rfc\");\n    mkdirSync(d, { recursive: true });\n    writeFileSync(join(d, \"001.md\"), \"# RFC\", \"utf-8\");\n    mkStatus();\n    mkCommitConfig();\n    const result = scoreAuditable(dir, [\"docs/rfc/001.md\"]);\n    expect(result.score).toBe(2);\n  });\n});\n\ndescribe(\"evidence content — partial signals\", () => {\n  it(\"absent items appear under Missing: label, not Present:\", () => {\n    // Kills ConditionalExpression L45/L47/L49 and ArrayDeclaration L43/L44\n    mkStatus();\n    const result = scoreAuditable(dir, []);\n    expect(result.score).toBe(1);\n    const presentLine = result.evidence.find((e) => e.startsWith(\"Present:\")) ?? \"\";\n    const missingLine = result.evidence.find((e) => e.startsWith(\"Missing:\")) ?? \"\";\n    expect(presentLine).toContain(\"Status.md\");\n    expect(missingLine).toContain(\"ADR\");\n    expect(missingLine).toContain(\"commitlint\");\n    expect(presentLine).not.toContain(\"ADR\");\n  });\n\n  it(\"non-ADR markdown files do not inflate ADR count\", () => {\n    // Kills LogicalOperator L17: && → || (any .md file would count as ADR)\n    mkStatus();\n    mkCommitConfig();\n    const result = scoreAuditable(dir, [\"README.md\", \"CHANGELOG.md\"]);\n    expect(result.score).toBe(1);\n    const missingLine = result.evidence.find((e) => e.startsWith(\"Missing:\")) ?? \"\";\n    expect(missingLine).toContain(\"ADR\");\n  });\n});\n"},"tests/analyzers/scorers/scorer-utils.test.ts":{"tests":[{"id":"147","name":"gs builder builds a score record with all fields"},{"id":"148","name":"gs builder preserves score 0"},{"id":"149","name":"gs builder preserves multiple evidence lines"},{"id":"150","name":"isSourceCodeFile returns true for .ts"},{"id":"151","name":"isSourceCodeFile returns true for .tsx"},{"id":"152","name":"isSourceCodeFile returns true for .js"},{"id":"153","name":"isSourceCodeFile returns true for .jsx"},{"id":"154","name":"isSourceCodeFile returns true for .py"},{"id":"155","name":"isSourceCodeFile returns true for .kt"},{"id":"156","name":"isSourceCodeFile returns true for .rs"},{"id":"157","name":"isSourceCodeFile returns false for .md"},{"id":"158","name":"isSourceCodeFile returns false for .json"},{"id":"159","name":"isSourceCodeFile returns false for .yaml"},{"id":"160","name":"isSourceCodeFile returns false for .txt"},{"id":"161","name":"isSourceCodeFile returns false for .sh"},{"id":"162","name":"isTestOrFixtureFile detects .test.ts"},{"id":"163","name":"isTestOrFixtureFile detects .spec.ts"},{"id":"164","name":"isTestOrFixtureFile detects __tests__ directory"},{"id":"165","name":"isTestOrFixtureFile detects /tests/ directory"},{"id":"166","name":"isTestOrFixtureFile detects /fixtures/ path"},{"id":"167","name":"isTestOrFixtureFile detects /mocks/ path"},{"id":"168","name":"isTestOrFixtureFile detects /mock/ path (singular)"},{"id":"169","name":"isTestOrFixtureFile detects .d.ts"},{"id":"170","name":"isTestOrFixtureFile detects test_ prefix (underscore)"},{"id":"171","name":"isTestOrFixtureFile returns false for normal source"},{"id":"172","name":"isTestOrFixtureFile handles Windows backslashes"},{"id":"173","name":"isConfigOrDeclaration detects .d.ts"},{"id":"174","name":"isConfigOrDeclaration detects config. prefix"},{"id":"175","name":"isConfigOrDeclaration detects .config. infix"},{"id":"176","name":"isConfigOrDeclaration detects index.ts"},{"id":"177","name":"isConfigOrDeclaration detects schema.prisma"},{"id":"178","name":"isConfigOrDeclaration returns false for regular source"},{"id":"179","name":"isRouteFile detects /routes/ directory"},{"id":"180","name":"isRouteFile detects /controllers/ directory"},{"id":"181","name":"isRouteFile detects /handlers/ directory"},{"id":"182","name":"isRouteFile detects /api/ directory"},{"id":"183","name":"isRouteFile detects /endpoints/ directory"},{"id":"184","name":"isRouteFile returns false for service file"},{"id":"185","name":"isRouteFile handles Windows backslashes"},{"id":"186","name":"isRouteFile is case-insensitive"},{"id":"187","name":"collectDbViolations detects prisma call"},{"id":"188","name":"collectDbViolations detects mongoose.model"},{"id":"189","name":"collectDbViolations skips comment lines"},{"id":"190","name":"collectDbViolations skips comment without leading space"},{"id":"191","name":"collectDbViolations flags db call with inline trailing comment (not a comment line)"},{"id":"192","name":"collectDbViolations skips import lines"},{"id":"193","name":"collectDbViolations collects multiple violations from different lines"},{"id":"194","name":"collectDbViolations truncates snippet to 120 chars"},{"id":"195","name":"collectDbViolations collects nothing from clean lines"},{"id":"196","name":"stripExtension strips .ts"},{"id":"197","name":"stripExtension strips .test.ts"},{"id":"198","name":"stripExtension strips .js"},{"id":"199","name":"stripExtension handles no extension"},{"id":"200","name":"testFileExists finds a test file by base name"},{"id":"201","name":"testFileExists returns false when no matching test"},{"id":"202","name":"testFileExists matches by base name regardless of path"},{"id":"203","name":"testFileExists preserves base names with .test not at the end"},{"id":"204","name":"constants MIN_INSTRUCTION_FILE_LINES is 40"},{"id":"205","name":"constants MIN_KEYWORD_HITS is 3"},{"id":"206","name":"constants DB_CALL_PATTERNS is non-empty"},{"id":"207","name":"constants ROUTE_DIRS includes routes and controllers"}],"source":"import { describe, it, expect } from \"vitest\";\nimport {\n  gs,\n  isSourceCodeFile,\n  isTestOrFixtureFile,\n  isConfigOrDeclaration,\n  isRouteFile,\n  collectDbViolations,\n  stripExtension,\n  testFileExists,\n  DB_CALL_PATTERNS,\n  ROUTE_DIRS,\n  MIN_INSTRUCTION_FILE_LINES,\n  MIN_KEYWORD_HITS,\n} from \"../../../src/analyzers/scorers/scorer-utils.js\";\nimport type { LayerViolation } from \"../../../src/shared/types.js\";\n\ndescribe(\"gs builder\", () => {\n  it(\"builds a score record with all fields\", () => {\n    const result = gs(\"bounded\", 2, [\"clean\"]);\n    expect(result).toEqual({ property: \"bounded\", score: 2, evidence: [\"clean\"] });\n  });\n\n  it(\"preserves score 0\", () => {\n    expect(gs(\"verifiable\", 0, []).score).toBe(0);\n  });\n\n  it(\"preserves multiple evidence lines\", () => {\n    const e = [\"line1\", \"line2\", \"line3\"];\n    expect(gs(\"auditable\", 1, e).evidence).toEqual(e);\n  });\n});\n\ndescribe(\"isSourceCodeFile\", () => {\n  it.each([\".ts\", \".tsx\", \".js\", \".jsx\", \".py\", \".kt\", \".rs\"])(\n    \"returns true for %s\",\n    (ext) => expect(isSourceCodeFile(`file${ext}`)).toBe(true),\n  );\n\n  it.each([\".md\", \".json\", \".yaml\", \".txt\", \".sh\"])(\n    \"returns false for %s\",\n    (ext) => expect(isSourceCodeFile(`file${ext}`)).toBe(false),\n  );\n});\n\ndescribe(\"isTestOrFixtureFile\", () => {\n  it(\"detects .test.ts\", () => expect(isTestOrFixtureFile(\"foo.test.ts\")).toBe(true));\n  it(\"detects .spec.ts\", () => expect(isTestOrFixtureFile(\"foo.spec.ts\")).toBe(true));\n  it(\"detects __tests__ directory\", () => expect(isTestOrFixtureFile(\"__tests__/foo.ts\")).toBe(true));\n  it(\"detects /tests/ directory\", () => expect(isTestOrFixtureFile(\"/tests/tools/foo.ts\")).toBe(true));\n  it(\"detects /fixtures/ path\", () => expect(isTestOrFixtureFile(\"tests/fixtures/stub.ts\")).toBe(true));\n  it(\"detects /mocks/ path\", () => expect(isTestOrFixtureFile(\"src/mocks/fake.ts\")).toBe(true));\n  it(\"detects /mock/ path (singular)\", () => expect(isTestOrFixtureFile(\"src/mock/stub.ts\")).toBe(true));\n  it(\"detects .d.ts\", () => expect(isTestOrFixtureFile(\"types.d.ts\")).toBe(true));\n  it(\"detects test_ prefix (underscore)\", () => expect(isTestOrFixtureFile(\"test_utils.ts\")).toBe(true));\n  it(\"returns false for normal source\", () => expect(isTestOrFixtureFile(\"src/tools/audit.ts\")).toBe(false));\n  it(\"handles Windows backslashes\", () => expect(isTestOrFixtureFile(\"tests\\\\tools\\\\foo.test.ts\")).toBe(true));\n});\n\ndescribe(\"isConfigOrDeclaration\", () => {\n  it(\"detects .d.ts\", () => expect(isConfigOrDeclaration(\"types.d.ts\")).toBe(true));\n  it(\"detects config. prefix\", () => expect(isConfigOrDeclaration(\"config.ts\")).toBe(true));\n  it(\"detects .config. infix\", () => expect(isConfigOrDeclaration(\"vitest.config.ts\")).toBe(true));\n  it(\"detects index.ts\", () => expect(isConfigOrDeclaration(\"src/tools/index.ts\")).toBe(true));\n  it(\"detects schema.prisma\", () => expect(isConfigOrDeclaration(\"schema.prisma\")).toBe(true));\n  it(\"returns false for regular source\", () => expect(isConfigOrDeclaration(\"src/tools/audit.ts\")).toBe(false));\n});\n\ndescribe(\"isRouteFile\", () => {\n  it(\"detects /routes/ directory\", () => expect(isRouteFile(\"src/routes/user.ts\")).toBe(true));\n  it(\"detects /controllers/ directory\", () => expect(isRouteFile(\"src/controllers/user.ts\")).toBe(true));\n  it(\"detects /handlers/ directory\", () => expect(isRouteFile(\"src/handlers/user.ts\")).toBe(true));\n  it(\"detects /api/ directory\", () => expect(isRouteFile(\"src/api/user.ts\")).toBe(true));\n  it(\"detects /endpoints/ directory\", () => expect(isRouteFile(\"src/endpoints/user.ts\")).toBe(true));\n  it(\"returns false for service file\", () => expect(isRouteFile(\"src/services/user.ts\")).toBe(false));\n  it(\"handles Windows backslashes\", () => expect(isRouteFile(\"src\\\\routes\\\\user.ts\")).toBe(true));\n  it(\"is case-insensitive\", () => expect(isRouteFile(\"src/Routes/foo.ts\")).toBe(true));\n});\n\ndescribe(\"collectDbViolations\", () => {\n  it(\"detects prisma call\", () => {\n    const violations: LayerViolation[] = [];\n    collectDbViolations([\"const u = prisma.user.findMany()\"], \"routes/user.ts\", violations);\n    expect(violations).toHaveLength(1);\n    expect(violations[0]!.line).toBe(1);\n    expect(violations[0]!.file).toBe(\"routes/user.ts\");\n  });\n\n  it(\"detects mongoose.model\", () => {\n    const violations: LayerViolation[] = [];\n    collectDbViolations([\"const M = mongoose.model('User', schema)\"], \"controllers/c.ts\", violations);\n    expect(violations).toHaveLength(1);\n  });\n\n  it(\"skips comment lines\", () => {\n    const violations: LayerViolation[] = [];\n    collectDbViolations([\"// prisma.user.findMany()\"], \"routes/user.ts\", violations);\n    expect(violations).toHaveLength(0);\n  });\n\n  it(\"skips comment without leading space\", () => {\n    const violations: LayerViolation[] = [];\n    collectDbViolations([\"//prisma.user.findMany()\"], \"routes/user.ts\", violations);\n    expect(violations).toHaveLength(0);\n  });\n\n  it(\"flags db call with inline trailing comment (not a comment line)\", () => {\n    const violations: LayerViolation[] = [];\n    collectDbViolations([\"const u = prisma.user.findMany() // fetch all\"], \"routes/user.ts\", violations);\n    expect(violations).toHaveLength(1);\n  });\n\n  it(\"skips import lines\", () => {\n    const violations: LayerViolation[] = [];\n    collectDbViolations([\"import { prisma } from './db'\"], \"routes/user.ts\", violations);\n    expect(violations).toHaveLength(0);\n  });\n\n  it(\"collects multiple violations from different lines\", () => {\n    const violations: LayerViolation[] = [];\n    collectDbViolations(\n      [\"prisma.user.findMany()\", \"const x = 1\", \"db.posts.query()\"],\n      \"routes/user.ts\",\n      violations,\n    );\n    expect(violations).toHaveLength(2);\n    expect(violations[0]!.line).toBe(1);\n    expect(violations[1]!.line).toBe(3);\n  });\n\n  it(\"truncates snippet to 120 chars\", () => {\n    const violations: LayerViolation[] = [];\n    const longLine = \"prisma.user.findMany(\" + \"x\".repeat(200) + \")\";\n    collectDbViolations([longLine], \"routes/r.ts\", violations);\n    expect(violations[0]!.snippet.length).toBe(120);\n  });\n\n  it(\"collects nothing from clean lines\", () => {\n    const violations: LayerViolation[] = [];\n    collectDbViolations([\"const x = userService.getUser(id)\"], \"routes/r.ts\", violations);\n    expect(violations).toHaveLength(0);\n  });\n});\n\ndescribe(\"stripExtension\", () => {\n  it(\"strips .ts\", () => expect(stripExtension(\"foo.ts\")).toBe(\"foo\"));\n  it(\"strips .test.ts\", () => expect(stripExtension(\"foo.test.ts\")).toBe(\"foo.test\"));\n  it(\"strips .js\", () => expect(stripExtension(\"foo.js\")).toBe(\"foo\"));\n  it(\"handles no extension\", () => expect(stripExtension(\"foo\")).toBe(\"foo\"));\n});\n\ndescribe(\"testFileExists\", () => {\n  const files = [\"tests/tools/audit.test.ts\", \"src/tools/audit.ts\", \"tests/shared/errors.test.ts\"];\n\n  it(\"finds a test file by base name\", () => {\n    expect(testFileExists(\"audit\", files)).toBe(true);\n  });\n\n  it(\"returns false when no matching test\", () => {\n    expect(testFileExists(\"refresh\", files)).toBe(false);\n  });\n\n  it(\"matches by base name regardless of path\", () => {\n    expect(testFileExists(\"errors\", files)).toBe(true);\n  });\n\n  it(\"preserves base names with .test not at the end\", () => {\n    // Kills the mutation that removes the $ end-anchor from /\\.(test|spec)$/\n    // Without $, \"foo.test.bar\" → replace first .test → \"foo.bar\" ≠ \"foo.test.bar\"\n    const testFiles = [\"tests/foo.test.bar.ts\"];\n    expect(testFileExists(\"foo.test.bar\", testFiles)).toBe(true);\n  });\n});\n\ndescribe(\"constants\", () => {\n  it(\"MIN_INSTRUCTION_FILE_LINES is 40\", () => expect(MIN_INSTRUCTION_FILE_LINES).toBe(40));\n  it(\"MIN_KEYWORD_HITS is 3\", () => expect(MIN_KEYWORD_HITS).toBe(3));\n  it(\"DB_CALL_PATTERNS is non-empty\", () => expect(DB_CALL_PATTERNS.length).toBeGreaterThan(0));\n  it(\"ROUTE_DIRS includes routes and controllers\", () => {\n    expect(ROUTE_DIRS).toContain(\"routes\");\n    expect(ROUTE_DIRS).toContain(\"controllers\");\n  });\n});\n"},"tests/analyzers/scorers/self-describing-scorer.test.ts":{"tests":[{"id":"208","name":"score 0 — no instruction file returns score 0 when directory is empty"},{"id":"209","name":"score 1 — file found but stub returns score 1 for CLAUDE.md with fewer than MIN lines"},{"id":"210","name":"score 1 — file found but stub returns score 1 for CLAUDE.md with enough lines but too few keywords"},{"id":"211","name":"score 1 — file found but stub returns score 1 for .clinerules stub"},{"id":"212","name":"score 1 — file found but stub returns score 1 for .windsurfrules stub"},{"id":"213","name":"score 1 — file found but stub returns score 1 for CONVENTIONS.md stub"},{"id":"214","name":"score 2 — substantive instruction file returns score 2 for CLAUDE.md with enough lines and keywords"},{"id":"215","name":"score 2 — substantive instruction file returns score 2 for copilot-instructions.md"},{"id":"216","name":"score 2 — substantive instruction file prefers CLAUDE.md when multiple instruction files exist"},{"id":"217","name":"score 2 — substantive instruction file evidence line reports correct non-empty line count"},{"id":"218","name":"score 2 — substantive instruction file returns score 2 when file has exactly MIN_INSTRUCTION_FILE_LINES non-empty lines"},{"id":"219","name":"score 2 — substantive instruction file blank lines are excluded from non-empty line count"},{"id":"220","name":"score 1 — missing keywords evidence lists specific missing keywords in evidence"}],"source":"import { describe, it, expect, beforeEach, afterEach } from \"vitest\";\nimport { mkdtempSync, mkdirSync, writeFileSync, rmSync } from \"node:fs\";\nimport { join } from \"node:path\";\nimport { tmpdir } from \"node:os\";\nimport { scoreSelfDescribing } from \"../../../src/analyzers/scorers/self-describing-scorer.js\";\nimport { MIN_INSTRUCTION_FILE_LINES, MIN_KEYWORD_HITS, INSTRUCTION_COVERAGE_KEYWORDS } from \"../../../src/analyzers/scorers/scorer-utils.js\";\n\nlet dir: string;\n\nbeforeEach(() => { dir = mkdtempSync(join(tmpdir(), \"fc-sd-\")); });\nafterEach(() => { rmSync(dir, { recursive: true, force: true }); });\n\nfunction writeInstruction(filename: string, content: string) {\n  const full = join(dir, filename);\n  const parent = full.substring(0, full.lastIndexOf(\"/\") === -1 ? full.lastIndexOf(\"\\\\\") : full.lastIndexOf(\"/\"));\n  if (parent !== full) mkdirSync(parent, { recursive: true });\n  writeFileSync(full, content, \"utf-8\");\n}\n\nfunction substantiveContent(extraKeywords: string[] = []): string {\n  const base = [\n    ...INSTRUCTION_COVERAGE_KEYWORDS.slice(0, MIN_KEYWORD_HITS),\n    ...extraKeywords,\n  ].join(\"\\n\");\n  const lines = Array.from({ length: MIN_INSTRUCTION_FILE_LINES + 5 }, (_, i) => `line ${i}`);\n  return [base, ...lines].join(\"\\n\");\n}\n\ndescribe(\"score 0 — no instruction file\", () => {\n  it(\"returns score 0 when directory is empty\", () => {\n    const result = scoreSelfDescribing(dir);\n    expect(result.score).toBe(0);\n    expect(result.property).toBe(\"self-describing\");\n    expect(result.evidence[0]).toMatch(/No AI assistant instruction file/);\n  });\n});\n\ndescribe(\"score 1 — file found but stub\", () => {\n  it(\"returns score 1 for CLAUDE.md with fewer than MIN lines\", () => {\n    writeFileSync(join(dir, \"CLAUDE.md\"), \"# Project\\nA short file.\\n\", \"utf-8\");\n    const result = scoreSelfDescribing(dir);\n    expect(result.score).toBe(1);\n    expect(result.evidence[0]).toMatch(/non-empty lines/);\n  });\n\n  it(\"returns score 1 for CLAUDE.md with enough lines but too few keywords\", () => {\n    const lines = Array.from({ length: MIN_INSTRUCTION_FILE_LINES + 1 }, (_, i) => `line ${i}`).join(\"\\n\");\n    writeFileSync(join(dir, \"CLAUDE.md\"), lines, \"utf-8\");\n    const result = scoreSelfDescribing(dir);\n    expect(result.score).toBe(1);\n    expect(result.evidence.some((e) => e.includes(\"Missing keywords\"))).toBe(true);\n  });\n\n  it(\"returns score 1 for .clinerules stub\", () => {\n    writeFileSync(join(dir, \".clinerules\"), \"short\\n\", \"utf-8\");\n    const result = scoreSelfDescribing(dir);\n    expect(result.score).toBe(1);\n  });\n\n  it(\"returns score 1 for .windsurfrules stub\", () => {\n    writeFileSync(join(dir, \".windsurfrules\"), \"short\\n\", \"utf-8\");\n    const result = scoreSelfDescribing(dir);\n    expect(result.score).toBe(1);\n  });\n\n  it(\"returns score 1 for CONVENTIONS.md stub\", () => {\n    writeFileSync(join(dir, \"CONVENTIONS.md\"), \"short\\n\", \"utf-8\");\n    const result = scoreSelfDescribing(dir);\n    expect(result.score).toBe(1);\n  });\n});\n\ndescribe(\"score 2 — substantive instruction file\", () => {\n  it(\"returns score 2 for CLAUDE.md with enough lines and keywords\", () => {\n    writeFileSync(join(dir, \"CLAUDE.md\"), substantiveContent(), \"utf-8\");\n    const result = scoreSelfDescribing(dir);\n    expect(result.score).toBe(2);\n    expect(result.evidence[0]).toMatch(/CLAUDE\\.md found/);\n    expect(result.evidence[1]).toMatch(/Covers:/);\n  });\n\n  it(\"returns score 2 for copilot-instructions.md\", () => {\n    const ghDir = join(dir, \".github\");\n    mkdirSync(ghDir, { recursive: true });\n    writeFileSync(join(ghDir, \"copilot-instructions.md\"), substantiveContent(), \"utf-8\");\n    const result = scoreSelfDescribing(dir);\n    expect(result.score).toBe(2);\n  });\n\n  it(\"prefers CLAUDE.md when multiple instruction files exist\", () => {\n    writeFileSync(join(dir, \"CLAUDE.md\"), substantiveContent(), \"utf-8\");\n    writeFileSync(join(dir, \"CONVENTIONS.md\"), substantiveContent(), \"utf-8\");\n    const result = scoreSelfDescribing(dir);\n    expect(result.evidence[0]).toMatch(/CLAUDE\\.md/);\n  });\n\n  it(\"evidence line reports correct non-empty line count\", () => {\n    const content = substantiveContent();\n    const nonEmptyCount = content.split(\"\\n\").filter((l) => l.trim().length > 0).length;\n    writeFileSync(join(dir, \"CLAUDE.md\"), content, \"utf-8\");\n    const result = scoreSelfDescribing(dir);\n    expect(result.evidence[0]).toContain(String(nonEmptyCount));\n  });\n\n  it(\"returns score 2 when file has exactly MIN_INSTRUCTION_FILE_LINES non-empty lines\", () => {\n    // Kills EqualityOperator L37: <"+" MIN_INSTRUCTION_FILE_LINES → <"+"= (40 <"+"= 40 = true → score 1)\n    const keywords = INSTRUCTION_COVERAGE_KEYWORDS.slice(0, MIN_KEYWORD_HITS).join(\"\\n\");\n    const filler = Array.from({ length: MIN_INSTRUCTION_FILE_LINES - MIN_KEYWORD_HITS }, (_, i) => `line ${i}`);\n    const content = [keywords, ...filler].join(\"\\n\");\n    const nonEmptyCount = content.split(\"\\n\").filter((l) => l.trim().length > 0).length;\n    expect(nonEmptyCount).toBe(MIN_INSTRUCTION_FILE_LINES);\n    writeFileSync(join(dir, \"CLAUDE.md\"), content, \"utf-8\");\n    const result = scoreSelfDescribing(dir);\n    expect(result.score).toBe(2);\n  });\n\n  it(\"blank lines are excluded from non-empty line count\", () => {\n    // Kills EqualityOperator L35: > 0 → >= 0 (blank lines counted, inflating count)\n    // File has MIN-1 non-blank lines, so normally score 1 (stub).\n    // With mutation, blank lines count, potentially reaching MIN.\n    const keywords = INSTRUCTION_COVERAGE_KEYWORDS.slice(0, MIN_KEYWORD_HITS).join(\"\\n\");\n    const nonBlankLines = MIN_INSTRUCTION_FILE_LINES - 1 - MIN_KEYWORD_HITS;\n    const filler = Array.from({ length: nonBlankLines }, (_, i) => `line ${i}`);\n    const blanks = Array.from({ length: 10 }, () => \"\");\n    const content = [keywords, ...filler, ...blanks].join(\"\\n\");\n    writeFileSync(join(dir, \"CLAUDE.md\"), content, \"utf-8\");\n    const result = scoreSelfDescribing(dir);\n    expect(result.score).toBe(1);\n    expect(result.evidence[0]).toMatch(/non-empty lines/);\n  });\n});\n\ndescribe(\"score 1 — missing keywords evidence\", () => {\n  it(\"lists specific missing keywords in evidence\", () => {\n    // Kills BooleanLiteral L49 and ArrowFunction L49\n    // (!lower.includes(kw) → false would make missing list empty)\n    const lines = Array.from({ length: MIN_INSTRUCTION_FILE_LINES + 1 }, (_, i) => `line ${i}`).join(\"\\n\");\n    const content = `architecture\\n${lines}`;\n    writeFileSync(join(dir, \"CLAUDE.md\"), content, \"utf-8\");\n    const result = scoreSelfDescribing(dir);\n    expect(result.score).toBe(1);\n    const missingLine = result.evidence.find((e) => e.includes(\"Missing keywords\")) ?? \"\";\n    expect(missingLine.length).toBeGreaterThan(\"Missing keywords: \".length);\n  });\n});\n"},"tests/cli/args.test.ts":{"tests":[{"id":"221","name":"parseCliArgs command extraction extracts command from first argument"},{"id":"222","name":"parseCliArgs command extraction defaults to 'serve' when no arguments given"},{"id":"223","name":"parseCliArgs command extraction returns empty positional and flags for a bare command"},{"id":"224","name":"parseCliArgs positional arguments collects positional args before flags"},{"id":"225","name":"parseCliArgs positional arguments collects multiple positional args"},{"id":"226","name":"parseCliArgs positional arguments non-flag arg after a value-flag is consumed as the flag's value, not positional"},{"id":"227","name":"parseCliArgs boolean flags parses --flag alone as true"},{"id":"228","name":"parseCliArgs boolean flags parses --no-flag as false"},{"id":"229","name":"parseCliArgs boolean flags parses multiple boolean flags"},{"id":"230","name":"parseCliArgs value flags parses --flag value as array with one element"},{"id":"231","name":"parseCliArgs value flags parses --flag val1 val2 as array"},{"id":"232","name":"parseCliArgs value flags stops collecting values at the next --flag"},{"id":"233","name":"parseCliArgs value flags parses multiple value flags independently"},{"id":"234","name":"parseCliArgs mixed input bare boolean flag followed by positional-style value consumes value as flag value"},{"id":"235","name":"parseCliArgs mixed input handles all three types together"},{"id":"236","name":"str helper returns first element of an array flag"},{"id":"237","name":"str helper returns first element when array has multiple values"},{"id":"238","name":"str helper returns undefined for boolean flag"},{"id":"239","name":"str helper returns undefined for missing flag"},{"id":"240","name":"arr helper returns array for array flag"},{"id":"241","name":"arr helper returns undefined for boolean flag"},{"id":"242","name":"arr helper returns undefined for missing flag"},{"id":"243","name":"arr helper returns undefined for empty array"},{"id":"244","name":"bool helper returns true for boolean true flag"},{"id":"245","name":"bool helper returns false for boolean false flag (--no-*)"},{"id":"246","name":"bool helper returns defaultVal when flag is absent"},{"id":"247","name":"bool helper returns defaultVal when flag is an array (not boolean)"}],"source":"import { describe, it, expect } from \"vitest\";\nimport { parseCliArgs, str, arr, bool } from \"../../src/cli/args.js\";\n\ndescribe(\"parseCliArgs\", () => {\n  describe(\"command extraction\", () => {\n    it(\"extracts command from first argument\", () => {\n      expect(parseCliArgs([\"audit\", \"/tmp/project\"]).command).toBe(\"audit\");\n    });\n\n    it(\"defaults to 'serve' when no arguments given\", () => {\n      expect(parseCliArgs([]).command).toBe(\"serve\");\n    });\n\n    it(\"returns empty positional and flags for a bare command\", () => {\n      const result = parseCliArgs([\"audit\"]);\n      expect(result.positional).toEqual([]);\n      expect(result.flags).toEqual({});\n    });\n  });\n\n  describe(\"positional arguments\", () => {\n    it(\"collects positional args before flags\", () => {\n      const result = parseCliArgs([\"audit\", \"/tmp/project\"]);\n      expect(result.positional).toEqual([\"/tmp/project\"]);\n    });\n\n    it(\"collects multiple positional args\", () => {\n      const result = parseCliArgs([\"scaffold\", \"/dir\", \"other\"]);\n      expect(result.positional).toEqual([\"/dir\", \"other\"]);\n    });\n\n    it(\"non-flag arg after a value-flag is consumed as the flag's value, not positional\", () => {\n      const result = parseCliArgs([\"audit\", \"--json\", \"/tmp/project\"]);\n      expect(result.flags[\"json\"]).toEqual([\"/tmp/project\"]);\n      expect(result.positional).toEqual([]);\n    });\n  });\n\n  describe(\"boolean flags\", () => {\n    it(\"parses --flag alone as true\", () => {\n      const result = parseCliArgs([\"audit\", \"--json\"]);\n      expect(result.flags[\"json\"]).toBe(true);\n    });\n\n    it(\"parses --no-flag as false\", () => {\n      const result = parseCliArgs([\"audit\", \"--no-anti-patterns\"]);\n      expect(result.flags[\"anti-patterns\"]).toBe(false);\n    });\n\n    it(\"parses multiple boolean flags\", () => {\n      const result = parseCliArgs([\"audit\", \"--json\", \"--dry-run\"]);\n      expect(result.flags[\"json\"]).toBe(true);\n      expect(result.flags[\"dry-run\"]).toBe(true);\n    });\n  });\n\n  describe(\"value flags\", () => {\n    it(\"parses --flag value as array with one element\", () => {\n      const result = parseCliArgs([\"scaffold\", \"--language\", \"typescript\"]);\n      expect(result.flags[\"language\"]).toEqual([\"typescript\"]);\n    });\n\n    it(\"parses --flag val1 val2 as array\", () => {\n      const result = parseCliArgs([\"generate\", \"--tags\", \"API\", \"CLI\"]);\n      expect(result.flags[\"tags\"]).toEqual([\"API\", \"CLI\"]);\n    });\n\n    it(\"stops collecting values at the next --flag\", () => {\n      const result = parseCliArgs([\"generate\", \"--tags\", \"API\", \"--json\"]);\n      expect(result.flags[\"tags\"]).toEqual([\"API\"]);\n      expect(result.flags[\"json\"]).toBe(true);\n    });\n\n    it(\"parses multiple value flags independently\", () => {\n      const result = parseCliArgs([\n        \"refresh\", \"--add-tags\", \"API\", \"CLI\", \"--remove-tags\", \"WEB\",\n      ]);\n      expect(result.flags[\"add-tags\"]).toEqual([\"API\", \"CLI\"]);\n      expect(result.flags[\"remove-tags\"]).toEqual([\"WEB\"]);\n    });\n  });\n\n  describe(\"mixed input\", () => {\n    it(\"bare boolean flag followed by positional-style value consumes value as flag value\", () => {\n      const result = parseCliArgs([\"audit\", \"--json\", \"/my/project\"]);\n      expect(result.flags[\"json\"]).toEqual([\"/my/project\"]);\n    });\n\n    it(\"handles all three types together\", () => {\n      const result = parseCliArgs([\n        \"refresh\", \"/project\", \"--add-tags\", \"API\", \"--apply\", \"--no-check\",\n      ]);\n      expect(result.command).toBe(\"refresh\");\n      expect(result.positional).toEqual([\"/project\"]);\n      expect(result.flags[\"add-tags\"]).toEqual([\"API\"]);\n      expect(result.flags[\"apply\"]).toBe(true);\n      expect(result.flags[\"check\"]).toBe(false);\n    });\n  });\n});\n\ndescribe(\"str helper\", () => {\n  it(\"returns first element of an array flag\", () => {\n    const flags = { lang: [\"typescript\"] };\n    expect(str(flags, \"lang\")).toBe(\"typescript\");\n  });\n\n  it(\"returns first element when array has multiple values\", () => {\n    const flags = { tags: [\"API\", \"CLI\"] };\n    expect(str(flags, \"tags\")).toBe(\"API\");\n  });\n\n  it(\"returns undefined for boolean flag\", () => {\n    const flags = { json: true };\n    expect(str(flags, \"json\")).toBeUndefined();\n  });\n\n  it(\"returns undefined for missing flag\", () => {\n    expect(str({}, \"missing\")).toBeUndefined();\n  });\n});\n\ndescribe(\"arr helper\", () => {\n  it(\"returns array for array flag\", () => {\n    const flags = { tags: [\"API\", \"CLI\"] };\n    expect(arr(flags, \"tags\")).toEqual([\"API\", \"CLI\"]);\n  });\n\n  it(\"returns undefined for boolean flag\", () => {\n    const flags = { json: true };\n    expect(arr(flags, \"json\")).toBeUndefined();\n  });\n\n  it(\"returns undefined for missing flag\", () => {\n    expect(arr({}, \"missing\")).toBeUndefined();\n  });\n\n  it(\"returns undefined for empty array\", () => {\n    const flags = { tags: [] as string[] };\n    expect(arr(flags as Record<"+"string, string[] | boolean>, \"tags\")).toBeUndefined();\n  });\n});\n\ndescribe(\"bool helper\", () => {\n  it(\"returns true for boolean true flag\", () => {\n    expect(bool({ json: true }, \"json\", false)).toBe(true);\n  });\n\n  it(\"returns false for boolean false flag (--no-*)\", () => {\n    expect(bool({ check: false }, \"check\", true)).toBe(false);\n  });\n\n  it(\"returns defaultVal when flag is absent\", () => {\n    expect(bool({}, \"json\", false)).toBe(false);\n    expect(bool({}, \"json\", true)).toBe(true);\n  });\n\n  it(\"returns defaultVal when flag is an array (not boolean)\", () => {\n    const flags = { tags: [\"API\"] };\n    expect(bool(flags, \"tags\", false)).toBe(false);\n  });\n});\n"},"tests/analyzers/scorers/bounded-scorer.test.ts":{"tests":[{"id":"248","name":"scoreBounded returns score 2 with no violations"},{"id":"249","name":"scoreBounded returns score 1 for 1 violation"},{"id":"250","name":"scoreBounded returns score 1 for 2 violations"},{"id":"251","name":"scoreBounded returns score 0 for 3 violations"},{"id":"252","name":"scoreBounded returns score 0 for many violations"},{"id":"253","name":"scoreBounded includes violation details in score 1 evidence"},{"id":"254","name":"scoreBounded caps evidence at 5 violations for score 0, appends 'and N more'"},{"id":"255","name":"scoreBounded does not append 'more' when exactly 5 violations"}],"source":"import { describe, it, expect } from \"vitest\";\nimport { scoreBounded } from \"../../../src/analyzers/scorers/bounded-scorer.js\";\nimport type { LayerViolation } from \"../../../src/shared/types.js\";\n\nfunction violation(file = \"routes/user.ts\", line = 1, snippet = \"prisma.user.findMany()\"): LayerViolation {\n  return { file, line, snippet };\n}\n\ndescribe(\"scoreBounded\", () => {\n  it(\"returns score 2 with no violations\", () => {\n    const result = scoreBounded([]);\n    expect(result.score).toBe(2);\n    expect(result.property).toBe(\"bounded\");\n    expect(result.evidence[0]).toMatch(/No direct DB/);\n  });\n\n  it(\"returns score 1 for 1 violation\", () => {\n    const result = scoreBounded([violation()]);\n    expect(result.score).toBe(1);\n    expect(result.evidence[0]).toMatch(/1 direct DB call/);\n  });\n\n  it(\"returns score 1 for 2 violations\", () => {\n    const result = scoreBounded([violation(), violation(\"routes/post.ts\", 5)]);\n    expect(result.score).toBe(1);\n    expect(result.evidence[0]).toMatch(/2 direct DB call/);\n  });\n\n  it(\"returns score 0 for 3 violations\", () => {\n    const result = scoreBounded([violation(), violation(), violation(\"routes/c.ts\", 9)]);\n    expect(result.score).toBe(0);\n    expect(result.evidence[0]).toMatch(/route layer is calling the DB directly/);\n  });\n\n  it(\"returns score 0 for many violations\", () => {\n    const violations = Array.from({ length: 10 }, (_, i) => violation(\"routes/r.ts\", i));\n    const result = scoreBounded(violations);\n    expect(result.score).toBe(0);\n  });\n\n  it(\"includes violation details in score 1 evidence\", () => {\n    const result = scoreBounded([violation(\"routes/user.ts\", 42, \"prisma.user.findMany()\")]);\n    expect(result.evidence.some((e) => e.includes(\"routes/user.ts\"))).toBe(true);\n    expect(result.evidence.some((e) => e.includes(\"42\"))).toBe(true);\n  });\n\n  it(\"caps evidence at 5 violations for score 0, appends 'and N more'\", () => {\n    const violations = Array.from({ length: 8 }, (_, i) => violation(\"r.ts\", i));\n    const result = scoreBounded(violations);\n    expect(result.evidence.some((e) => e.includes(\"3 more\"))).toBe(true);\n  });\n\n  it(\"does not append 'more' when exactly 5 violations\", () => {\n    const violations = Array.from({ length: 5 }, (_, i) => violation(\"r.ts\", i));\n    const result = scoreBounded(violations);\n    expect(result.evidence.some((e) => e.includes(\"more\"))).toBe(false);\n  });\n});\n"}},"projectRoot":"C:\\workspace\\PragmaWorks\\forge\\forgecraft-mcp","config":{"$schema":"https://stryker-mutator.io/schemas/stryker-schema.json#","testRunner":"vitest","testRunnerNodeArgs":["--experimental-vm-modules"],"mutate":["src/registry/sentinel-renderer.ts","src/analyzers/scorers/scorer-utils.ts","src/analyzers/scorers/self-describing-scorer.ts","src/analyzers/scorers/bounded-scorer.ts","src/analyzers/scorers/auditable-scorer.ts","src/analyzers/scorers/composable-scorer.ts","src/analyzers/scorers/defended-scorer.ts
