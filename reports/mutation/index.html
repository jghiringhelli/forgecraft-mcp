mport { extname, basename, dirname } from \"node:path\";\r\nimport type { GsProperty, GsPropertyScore, LayerViolation } from \"../../shared/types.js\";\r\n\r\n// ── Constants ─────────────────────────────────────────────────────────\r\n\r\n/** Directories that are considered \"route/controller\" layers. */\r\nexport const ROUTE_DIRS = [\"routes\", \"controllers\", \"handlers\", \"api\", \"endpoints\"];\r\n\r\n/** ORM/DB client call patterns to flag in route files. */\r\nexport const DB_CALL_PATTERNS: RegExp[] = [\r\n  /\\bprisma\\.\\w+\\.\\w+\\s*\\(/, // prisma.user.findMany(\r\n  /\\bdb\\.\\w+\\s*\\.\\s*\\w+\\s*\\(/, // db.user.findMany(\r\n  /\\.query\\s*\\(/, // connection.query(\r\n  /\\.execute\\s*\\(/, // db.execute(\r\n  /\\bnew\\s+PrismaClient\\b/, // new PrismaClient()\r\n  /\\bmongoose\\.model\\b/, // mongoose.model(\r\n  /\\bMongoose\\b.*\\.find\\b/, // Mongoose.(*).find(\r\n  /\\brepository\\s*=\\s*null\\b/, // uninitialized repository (smell)\r\n];\r\n\r\n/** Lines that are comments or imports — excluded from DB call detection. */\r\nexport const COMMENT_OR_IMPORT = /^\\s*(\\/\\/|\\/\\*|\\*|#|import\\s|require\\s*\\()/;\r\n\r\n/** Minimum instruction-file length to be considered substantive. */\r\nexport const MIN_INSTRUCTION_FILE_LINES = 40;\r\n\r\n/** Keywords that indicate an instruction file covers architecture/conventions/decisions. */\r\nexport const INSTRUCTION_COVERAGE_KEYWORDS = [\r\n  \"architecture\",\r\n  \"convention\",\r\n  \"decision\",\r\n  \"adr\",\r\n  \"domain\",\r\n  \"pattern\",\r\n  \"layer\",\r\n  \"repository\",\r\n  \"service\",\r\n];\r\n\r\n/** Minimum distinct keyword hits to award score 2 for Self-describing. */\r\nexport const MIN_KEYWORD_HITS = 3;\r\n\r\n// ── Builder ────────────────────────────────────────────────────────────\r\n\r\n/** Build a GsPropertyScore record. */\r\nexport function gs(\r\n  property: GsProperty,\r\n  score: 0 | 1 | 2,\r\n  evidence: string[],\r\n): GsPropertyScore {\r\n  return { property, score, evidence };\r\n}\r\n\r\n// ── File classification helpers ────────────────────────────────────────\r\n\r\n/** True for TypeScript/JavaScript/Python/Kotlin/Rust source files. */\r\nexport function isSourceCodeFile(filePath: string): boolean {\r\n  return [\".ts\", \".tsx\", \".js\", \".jsx\", \".py\", \".kt\", \".rs\"].includes(extname(filePath));\r\n}\r\n\r\n/** True for test or fixture files (should not require their own test). */\r\nexport function isTestOrFixtureFile(filePath: string): boolean {\r\n  const normalized = filePath.replace(/\\\\/g, \"/\");\r\n  return /(\\btest[_.]|\\.test\\.|\\.spec\\.|__tests__|\\/tests\\/|\\/test\\/|\\/fixtures\\/|\\/mocks?\\/|conftest|\\.d\\.ts)/.test(normalized);\r\n}\r\n\r\n/** True for declaration, config, or infrastructure files. */\r\nexport function isConfigOrDeclaration(filePath: string): boolean {\r\n  return /(\\.d\\.ts|config\\.|\\.config\\.|migration|seed|schema\\.prisma|index\\.ts)/.test(filePath);\r\n}\r\n\r\n/** True if a file path is inside a route or controller directory. */\r\nexport function isRouteFile(filePath: string): boolean {\r\n  const normalized = filePath.replace(/\\\\/g, \"/\");\r\n  return ROUTE_DIRS.some((dir) => new RegExp(`(^|/)${dir}/`, \"i\").test(normalized));\r\n}\r\n\r\n// ── Utility functions ──────────────────────────────────────────────────\r\n\r\n/** Collect DB-call violations from a single file's lines. */\r\nexport function collectDbViolations(\r\n  lines: string[],\r\n  relPath: string,\r\n  violations: LayerViolation[],\r\n): void {\r\n  for (let i = 0; i <"+" lines.length; i++) {\r\n    const line = lines[i] as string;\r\n    if (COMMENT_OR_IMPORT.test(line)) continue;\r\n    const matchedPattern = DB_CALL_PATTERNS.find((p) => p.test(line));\r\n    if (matchedPattern) {\r\n      violations.push({ file: relPath, line: i + 1, snippet: line.slice(0, 120) });\r\n    }\r\n  }\r\n}\r\n\r\n/** Strip the file extension from a filename. */\r\nexport function stripExtension(name: string): string {\r\n  return name.replace(/\\.[^.]+$/, \"\");\r\n}\r\n\r\n/** Build the canonical expected test file path for a source file. */\r\nexport function buildExpectedTestPath(sourceFile: string, base: string): string {\r\n  const dir = dirname(sourceFile);\r\n  return `${dir}/${base}.test.ts`;\r\n}\r\n\r\n/**\r\n * Check whether a test file exists for a given source base name.\r\n * Checks across the entire file set (co-located or in tests/ mirror).\r\n */\r\nexport function testFileExists(base: string, allFiles: string[]): boolean {\r\n  return allFiles.some(\r\n    (f) =>\r\n      isTestOrFixtureFile(f) &&\r\n      stripExtension(basename(f)).replace(/\\.(test|spec)$/, \"\") === base,\r\n  );\r\n}\r\n"},"src/tools/change-request.ts":{"language":"typescript","mutants":[{"id":"625","mutatorName":"BlockStatement","replacement":"{}","status":"NoCoverage","static":false,"coveredBy":[],"location":{"end":{"column":6,"line":102},"start":{"column":57,"line":100}}},{"id":"685","mutatorName":"BlockStatement","replacement":"{}","status":"NoCoverage","static":false,"coveredBy":[],"location":{"end":{"column":8,"line":139},"start":{"column":15,"line":137}}},{"id":"846","mutatorName":"BlockStatement","replacement":"{}","status":"NoCoverage","static":false,"coveredBy":[],"location":{"end":{"column":4,"line":264},"start":{"column":11,"line":262}}},{"id":"864","mutatorName":"BlockStatement","replacement":"{}","status":"NoCoverage","static":false,"coveredBy":[],"location":{"end":{"column":8,"line":287},"start":{"column":15,"line":285}}},{"id":"1063","mutatorName":"BlockStatement","replacement":"{}","status":"NoCoverage","static":false,"coveredBy":[],"location":{"end":{"column":4,"line":466},"start":{"column":11,"line":464}}},{"id":"1064","mutatorName":"BooleanLiteral","replacement":"true","status":"NoCoverage","static":false,"coveredBy":[],"location":{"end":{"column":17,"line":465},"start":{"column":12,"line":465}}},{"id":"547","mutatorName":"StringLiteral","replacement":"\"Stryker was ic":false,"testsCompleted":9,"killedBy":["72"],"coveredBy":["60","63","65","66","67","68","69","71","72"],"location":{"end":{"column":20,"line":463},"start":{"column":12,"line":463}}},{"id":"1061","mutatorName":"EqualityOperator","replacement":"days >= 7","statusReason":"expected '## Changes (1 total)\\n\\n### 📋 Open (…' not to contain 'stale'","status":"Killed","static":false,"testsCompleted":8,"killedBy":["71"],"coveredBy":["60","63","65","66","67","68","69","71","72"],"location":{"end":{"column":20,"line":463},"start":{"column":12,"line":463}}},{"id":"1062","mutatorName":"EqualityOperator","replacement":"days <"+"= 7","statusReason":"expected '## Changes (1 total)\\n\\n### 📋 Open (…' not to contain 'stale'","status":"Killed","static":false,"testsCompleted":8,"killedBy":["71"],"coveredBy":["60","63","65","66","67","68","69","71","72"],"location":{"end":{"column":20,"line":463},"start":{"column":12,"line":463}}}],"source":"/**\n * change_request and list_changes handlers.\n *\n * change_request: Opens a formal change record in .forgecraft/changes/<"+"slug>.yaml.\n * Captures intent, auto-detects affected artifacts, and lists gates that must pass.\n *\n * list_changes: Surfaces open/implementing/blocked changes with staleness flags.\n */\n\nimport { existsSync, mkdirSync, writeFileSync, readdirSync, readFileSync } from \"node:fs\";\nimport { join, resolve } from \"node:path\";\nimport type { ToolResult } from \"../shared/types.js\";\n\n// ── Types ─────────────────────────────────────────────────────────────\n\nexport type ChangeType =\n  | \"spec-change\"\n  | \"breaking-api\"\n  | \"adr-supersession\"\n  | \"gate-change\"\n  | \"dependency-update\";\n\nexport type ChangeStatus = \"open\" | \"implementing\" | \"blocked\" | \"verified\" | \"closed\";\n\nexport interface ChangeRecord {\n  readonly id: string;\n  readonly title: string;\n  readonly status: ChangeStatus;\n  readonly type: ChangeType;\n  readonly created: string;\n  readonly description: string;\n  readonly breaking: boolean;\n  readonly breaking_details?: string;\n  readonly affected_artifacts: string[];\n  readonly supersedes_adr?: string;\n  readonly required_gates: string[];\n  readonly blocked_reason?: string;\n  readonly verified_at?: string;\n  readonly closed_at?: string;\n}\n\n// ── Inputs ────────────────────────────────────────────────────────────\n\nexport interface ChangeRequestInput {\n  readonly project_dir: string;\n  readonly title: string;\n  readonly description: string;\n  readonly type: ChangeType;\n  readonly breaking?: boolean;\n  readonly breaking_details?: string;\n  readonly supersedes_adr?: string;\n  readonly affected_artifacts?: string[];\n}\n\nexport interface ListChangesInput {\n  readonly project_dir: string;\n  readonly status?: ChangeStatus | \"all\";\n}\n\n// ── Slug generation ───────────────────────────────────────────────────\n\nexport function slugify(title: string, date: string): string {\n  const slug = title\n    .toLowerCase()\n    .replace(/[^a-z0-9\\s-]/g, \"\")\n    .trim()\n    .replace(/\\s+/g, \"-\")\n    .slice(0, 40)\n    .replace(/-+$/, \"\");\n  return `chg-${date}-${slug}`;\n}\n\n// ── Artifact detection ────────────────────────────────────────────────\n\nexport function detectAffectedArtifacts(\n  projectDir: string,\n  title: string,\n  description: string,\n  type: ChangeType,\n): string[] {\n  const artifacts: string[] = [];\n  const words = `${title} ${description}`.toLowerCase().split(/\\s+/).filter((w) => w.length > 3);\n\n  const specFiles: Array<"+"[string, string[]]> = [\n    [\"docs/PRD.md\", [\"requirement\", \"product\", \"feature\", \"user\", \"problem\"]],\n    [\"docs/use-cases.md\", [\"use case\", \"actor\", \"workflow\", \"uc-\", \"flow\"]],\n    [\"docs/TechSpec.md\", [\"architecture\", \"implementation\", \"component\", \"system\"]],\n  ];\n\n  for (const [path, keywords] of specFiles) {\n    if (!existsSync(join(projectDir, path))) continue;\n    const hits = keywords.filter((kw) => words.some((w) => w.includes(kw.replace(/\\s+/, \"\"))));\n    if (hits.length > 0 || type === \"spec-change\") {\n      artifacts.push(path);\n    }\n  }\n\n  // Always include PRD if spec-change type\n  if (type === \"spec-change\" && !artifacts.includes(\"docs/PRD.md\")) {\n    if (existsSync(join(projectDir, \"docs\", \"PRD.md\"))) {\n      artifacts.push(\"docs/PRD.md\");\n    }\n  }\n\n  // ADR supersession\n  if (type === \"adr-supersession\" || words.some((w) => [\"adr\", \"decision\", \"architecture\"].includes(w))) {\n    const adrDir = join(projectDir, \"docs\", \"adrs\");\n    if (existsSync(adrDir)) {\n      artifacts.push(\"docs/adrs/\");\n    }\n  }\n\n  // Breaking API — flag schema and contract files\n  if (type === \"breaking-api\") {\n    for (const p of [\"docs/schema.md\", \"openapi.yaml\", \"openapi.json\"]) {\n      if (existsSync(join(projectDir, p))) artifacts.push(p);\n    }\n  }\n\n  return [...new Set(artifacts)];\n}\n\n// ── Gate detection ────────────────────────────────────────────────────\n\nexport function detectRequiredGates(projectDir: string, type: ChangeType, breaking: boolean): string[] {\n  const gates: string[] = [];\n\n  const gateDir = join(projectDir, \".forgecraft\", \"gates\", \"active\");\n  if (!existsSync(gateDir)) return gates;\n\n  const allGateIds = readdirSync(gateDir)\n    .filter((f) => f.endsWith(\".yaml\"))\n    .map((f) => {\n      try {\n        const text = readFileSync(join(gateDir, f), \"utf-8\");\n        return /^id:\\s*(.+)$/m.exec(text)?.[1]?.trim() ?? \"\";\n      } catch {\n        return \"\";\n      }\n    })\n    .filter(Boolean);\n\n  // Always include L2 coverage gate if present\n  for (const id of allGateIds) {\n    if (id.startsWith(\"l2-\") || id === \"contract-testing-required\") {\n      gates.push(id);\n    }\n  }\n\n  // Breaking API changes must pass schema and contract gates\n  if (breaking || type === \"breaking-api\") {\n    for (const id of allGateIds) {\n      if (id.includes(\"schema\") || id.includes(\"contract\")) {\n        if (!gates.includes(id)) gates.push(id);\n      }\n    }\n  }\n\n  return gates;\n}\n\n// ── YAML serialization ────────────────────────────────────────────────\n\nexport function serializeChangeRecord(record: ChangeRecord): string {\n  const lines: string[] = [\n    `id: ${record.id}`,\n    `title: \"${record.title.replace(/\"/g, '\\\\\"')}\"`,\n    `status: ${record.status}`,\n    `type: ${record.type}`,\n    `created: ${record.created}`,\n    `breaking: ${record.breaking}`,\n    ``,\n    `description: >`,\n    ...record.description.split(\"\\n\").map((l) => `  ${l}`),\n    ``,\n  ];\n\n  if (record.breaking_details) {\n    lines.push(`breaking_details: \"${record.breaking_details.replace(/\"/g, '\\\\\"')}\"`, ``);\n  }\n\n  if (record.supersedes_adr) {\n    lines.push(`supersedes_adr: ${record.supersedes_adr}`, ``);\n  }\n\n  lines.push(`affected_artifacts:`);\n  for (const a of record.affected_artifacts) {\n    lines.push(`  - ${a}`);\n  }\n  lines.push(``);\n\n  lines.push(`required_gates:`);\n  if (record.required_gates.length === 0) {\n    lines.push(`  []`);\n  } else {\n    for (const g of record.required_gates) {\n      lines.push(`  - ${g}`);\n    }\n  }\n  lines.push(``);\n\n  lines.push(`blocked_reason: ~`);\n  lines.push(`verified_at: ~`);\n  lines.push(`closed_at: ~`);\n\n  return lines.join(\"\\n\");\n}\n\n// ── YAML parsing ──────────────────────────────────────────────────────\n\nexport function parseChangeRecord(content: string, id: string): ChangeRecord | null {\n  try {\n    const fieldRe = (key: string) =>\n      new RegExp(`^${key}:\\\\s*[\"']?(.+?)[\"']?\\\\s*$`, \"m\").exec(content)?.[1]?.trim() ?? \"\";\n\n    const status = (fieldRe(\"status\") as ChangeStatus) || \"open\";\n    const type = (fieldRe(\"type\") as ChangeType) || \"spec-change\";\n    const title = fieldRe(\"title\");\n    const created = fieldRe(\"created\");\n    const breaking = fieldRe(\"breaking\") === \"true\";\n    const breaking_details = fieldRe(\"breaking_details\") || undefined;\n    const supersedes_adr = fieldRe(\"supersedes_adr\") || undefined;\n    const blocked_reason = fieldRe(\"blocked_reason\") !== \"~\" ? fieldRe(\"blocked_reason\") : undefined;\n    const verified_at = fieldRe(\"verified_at\") !== \"~\" ? fieldRe(\"verified_at\") : undefined;\n    const closed_at = fieldRe(\"closed_at\") !== \"~\" ? fieldRe(\"closed_at\") : undefined;\n\n    // Parse list fields\n    const parseList = (key: string): string[] => {\n      const match = new RegExp(`^${key}:\\\\n((?:\\\\s+-.+\\\\n?)+)`, \"m\").exec(content);\n      if (!match) return [];\n      return match[1]!\n        .split(\"\\n\")\n        .map((l) => l.replace(/^\\s+-\\s*/, \"\").trim())\n        .filter(Boolean);\n    };\n\n    const affected_artifacts = parseList(\"affected_artifacts\");\n    const required_gates = parseList(\"required_gates\");\n\n    // Extract description (block scalar)\n    const descMatch = /^description:\\s*>\\n((?:\\s{2}.+\\n?)+)/m.exec(content);\n    const description = descMatch\n      ? descMatch[1]!.split(\"\\n\").map((l) => l.replace(/^\\s{2}/, \"\")).join(\"\\n\").trim()\n      : \"\";\n\n    return {\n      id,\n      title,\n      status,\n      type,\n      created,\n      description,\n      breaking,\n      breaking_details,\n      supersedes_adr,\n      affected_artifacts,\n      required_gates,\n      blocked_reason,\n      verified_at,\n      closed_at,\n    };\n  } catch {\n    return null;\n  }\n}\n\n// ── Change directory helpers ──────────────────────────────────────────\n\nconst CHANGES_DIR = \".forgecraft/changes\";\n\nexport function changesDir(projectDir: string): string {\n  return join(projectDir, CHANGES_DIR);\n}\n\nexport function loadAllChanges(projectDir: string): ChangeRecord[] {\n  const dir = changesDir(projectDir);\n  if (!existsSync(dir)) return [];\n  return readdirSync(dir)\n    .filter((f) => f.endsWith(\".yaml\"))\n    .map((f) => {\n      try {\n        const content = readFileSync(join(dir, f), \"utf-8\");\n        const id = f.replace(/\\.yaml$/, \"\");\n        return parseChangeRecord(content, id);\n      } catch {\n        return null;\n      }\n    })\n    .filter((r): r is ChangeRecord => r !== null);\n}\n\n/** Returns changes in implementing status — used by close_cycle gate. */\nexport function getImplementingChanges(projectDir: string): ChangeRecord[] {\n  return loadAllChanges(projectDir).filter((c) => c.status === \"implementing\");\n}\n\n// ── Handlers ──────────────────────────────────────────────────────────\n\nexport async function changeRequestHandler(args: ChangeRequestInput): Promise<"+"ToolResult> {\n  const projectDir = resolve(args.project_dir);\n  const date = new Date().toISOString().slice(0, 10);\n  const id = slugify(args.title, date);\n\n  const affectedArtifacts =\n    args.affected_artifacts && args.affected_artifacts.length > 0\n      ? args.affected_artifacts\n      : detectAffectedArtifacts(projectDir, args.title, args.description, args.type);\n\n  const requiredGates = detectRequiredGates(\n    projectDir,\n    args.type,\n    args.breaking ?? false,\n  );\n\n  const record: ChangeRecord = {\n    id,\n    title: args.title,\n    status: \"open\",\n    type: args.type,\n    created: date,\n    description: args.description,\n    breaking: args.breaking ?? false,\n    breaking_details: args.breaking_details,\n    supersedes_adr: args.supersedes_adr,\n    affected_artifacts: affectedArtifacts,\n    required_gates: requiredGates,\n  };\n\n  const dir = changesDir(projectDir);\n  mkdirSync(dir, { recursive: true });\n  writeFileSync(join(dir, `${id}.yaml`), serializeChangeRecord(record), \"utf-8\");\n\n  const lines: string[] = [\n    `## Change Request Opened`,\n    ``,\n    `**ID:** \\`${id}\\``,\n    `**Title:** ${record.title}`,\n    `**Type:** ${record.type}`,\n    `**Breaking:** ${record.breaking ? \"⚠️ Yes\" : \"No\"}`,\n    ``,\n  ];\n\n  if (record.breaking_details) {\n    lines.push(`> ⚠️ **Breaking:** ${record.breaking_details}`, ``);\n  }\n\n  if (record.supersedes_adr) {\n    lines.push(`> Supersedes: \\`${record.supersedes_adr}\\` — update that ADR's status to Superseded.`, ``);\n  }\n\n  lines.push(`### Affected Artifacts`, ``);\n  for (const a of record.affected_artifacts) {\n    lines.push(`- \\`${a}\\``);\n  }\n  lines.push(``);\n\n  if (record.required_gates.length > 0) {\n    lines.push(`### Required Gates (must pass before \\`close_cycle\\`)`, ``);\n    for (const g of record.required_gates) {\n      lines.push(`- [ ] \\`${g}\\``);\n    }\n    lines.push(``);\n  }\n\n  lines.push(\n    `### Next Steps`,\n    ``,\n    `1. Update status to \\`implementing\\` when work starts (edit \\`.forgecraft/changes/${id}.yaml\\`)`,\n    `2. Run \\`propose_session\\` to get a full implementation plan`,\n    `3. After implementation: run required gates, set status to \\`verified\\``,\n    `4. Run \\`close_cycle\\` — blocked until all implementing changes are verified or closed`,\n    ``,\n    `---`,\n    `_Written to \\`.forgecraft/changes/${id}.yaml\\`_`,\n  );\n\n  return { content: [{ type: \"text\", text: lines.join(\"\\n\") }] };\n}\n\nexport async function listChangesHandler(args: ListChangesInput): Promise<"+"ToolResult> {\n  const projectDir = resolve(args.project_dir);\n  const filterStatus = args.status ?? \"all\";\n  const all = loadAllChanges(projectDir);\n\n  const filtered =\n    filterStatus === \"all\"\n      ? all\n      : all.filter((c) => c.status === filterStatus);\n\n  if (filtered.length === 0) {\n    const msg =\n      filterStatus === \"all\"\n        ? \"No change records found. Run `change_request` to open the first change.\"\n        : `No changes with status \\`${filterStatus}\\`.`;\n    return { content: [{ type: \"text\", text: `## Changes\\n\\n${msg}` }] };\n  }\n\n  const today = new Date().toISOString().slice(0, 10);\n\n  const statusGroups: Record<"+"ChangeStatus, ChangeRecord[]> = {\n    open: [],\n    implementing: [],\n    blocked: [],\n    verified: [],\n    closed: [],\n  };\n\n  for (const c of filtered) {\n    statusGroups[c.status].push(c);\n  }\n\n  const lines: string[] = [`## Changes (${filtered.length} total)`, ``];\n\n  const order: ChangeStatus[] = [\"implementing\", \"blocked\", \"open\", \"verified\", \"closed\"];\n  for (const status of order) {\n    const group = statusGroups[status];\n    if (group.length === 0) continue;\n\n    const emoji: Record<"+"ChangeStatus, string> = {\n      implementing: \"🔄\",\n      blocked: \"⛔\",\n      open: \"📋\",\n      verified: \"✅\",\n      closed: \"🔒\",\n    };\n\n    lines.push(`### ${emoji[status]} ${status.charAt(0).toUpperCase() + status.slice(1)} (${group.length})`, ``);\n    lines.push(`| ID | Title | Type | Breaking | Gates | Created |`);\n    lines.push(`|---|---|---|---|---|---|`);\n\n    for (const c of group) {\n      const staleFlag = isStale(c, today) ? \" ⚠️ stale\" : \"\";\n      const breaking = c.breaking ? \"⚠️ Yes\" : \"No\";\n      const gates = c.required_gates.length > 0 ? c.required_gates.length.toString() : \"—\";\n      lines.push(`| \\`${c.id}\\` | ${c.title}${staleFlag} | ${c.type} | ${breaking} | ${gates} | ${c.created} |`);\n    }\n    lines.push(``);\n  }\n\n  const implementing = statusGroups[\"implementing\"];\n  if (implementing.length > 0) {\n    lines.push(`### ⚠️ close_cycle will be blocked until these are resolved:`, ``);\n    for (const c of implementing) {\n      lines.push(`- \\`${c.id}\\` — ${c.title}`);\n      if (c.required_gates.length > 0) {\n        lines.push(`  Gates: ${c.required_gates.map((g) => `\\`${g}\\``).join(\", \")}`);\n      }\n    }\n    lines.push(``);\n  }\n\n  return { content: [{ type: \"text\", text: lines.join(\"\\n\") }] };\n}\n\n// ── Staleness ─────────────────────────────────────────────────────────\n\nfunction isStale(record: ChangeRecord, today: string): boolean {\n  if (record.status === \"closed\" || record.status === \"verified\") return false;\n onst found = instructionPaths.find((p) => existsSync(join(projectDir, p)));\r\n\r\n  if (!found) {\r\n    return gs(\"self-describing\", 0, [\"No AI assistant instruction file found\"]);\r\n  }\r\n\r\n  let content = \"\";\r\n  try { content = readFileSync(join(projectDir, found), \"utf-8\"); } catch { /* empty */ }\r\n  const lines = content.split(\"\\n\").filter((l) => l.trim().length > 0);\r\n\r\n  if (lines.length <"+" MIN_INSTRUCTION_FILE_LINES) {\r\n    return gs(\"self-describing\", 1, [\r\n      `${found} found but only ${lines.length} non-empty lines (<"+" ${MIN_INSTRUCTION_FILE_LINES} — treat as stub)`,\r\n    ]);\r\n  }\r\n\r\n  const lower = content.toLowerCase();\r\n  const hits = INSTRUCTION_COVERAGE_KEYWORDS.filter((kw) => lower.includes(kw));\r\n\r\n  if (hits.length <"+" MIN_KEYWORD_HITS) {\r\n    return gs(\"self-describing\", 1, [\r\n      `${found} found (${lines.length} lines) but covers fewer than ${MIN_KEYWORD_HITS} architecture/convention keywords`,\r\n      `Missing keywords: ${INSTRUCTION_COVERAGE_KEYWORDS.filter((kw) => !lower.includes(kw)).slice(0, 5).join(\", \")}`,\r\n    ]);\r\n  }\r\n\r\n  return gs(\"self-describing\", 2, [\r\n    `${found} found — ${lines.length} non-empty lines`,\r\n    `Covers: ${hits.join(\", \")}`,\r\n  ]);\r\n}\r\n"},"src/analyzers/scorers/verifiable-scorer.ts":{"language":"typescript","mutants":[{"id":"374","mutatorName":"StringLiteral","replacement":"\"\"","statusReason":"Ignored because of excluded mutation \"StringLiteral\"","status":"Ignored","static":false,"location":{"end":{"column":27,"line":20},"start":{"column":15,"line":20}}},{"id":"376","mutatorName":"StringLiteral","replacement":"\"\"","statusReason":"Ignored because of excluded mutation \"StringLiteral\"","status":"Ignored","static":false,"location":{"end":{"column":65,"line":20},"start":{"column":33,"line":20}}},{"id":"400","mutatorName":"StringLiteral","replacement":"\"\"","statusReason":"Ignored because of excluded mutation \"StringLiteral\""," Files.length === 0) {\r\n    return gs(\"verifiable\", 0, [\"No test files found in project\"]);\r\n  }\r\n\r\n  const sourceCount = allFiles.filter(\r\n    (f) => isSourceCodeFile(f) && !isTestOrFixtureFile(f) && !isConfigOrDeclaration(f),\r\n  ).length;\r\n\r\n  const missingCount = missingTestFiles.length;\r\n  const missingPct = sourceCount > 0 ? missingCount / sourceCount : 0;\r\n  const coveredPct = Math.round((1 - missingPct) * 100);\r\n\r\n  if (testsPassed && missingPct <"+"= 0.2) {\r\n    return gs(\"verifiable\", 2, [\r\n      `Tests passed — ${testFiles.length} test file(s) found`,\r\n      `${coveredPct}% of source modules have test counterparts`,\r\n    ]);\r\n  }\r\n\r\n  const evidence: string[] = [`${testFiles.length} test file(s) found`];\r\n  if (!testsPassed) evidence.push(\"Test suite did not pass\");\r\n  if (missingPct > 0.2) {\r\n    evidence.push(`${coveredPct}% of source modules have tests (target ≥ 80%)`);\r\n    evidence.push(`${missingCount} module(s) without tests`);\r\n  }\r\n\r\n  return gs(\"verifiable\", 1, evidence);\r\n}\r\n"},"src/cli/args.ts":{"language":"typescript","mutants":[{"id":"419","mutatorName":"StringLiteral","replacement":"\"\"","statusReason":"Ignored because of excluded mutation \"StringLiteral\"","status":"Ignored","static":false,"location":{"end":{"column":27,"line":28},"start":{"column":20,"line":28}}},{"id":"428","mutatorName":"StringLiteral","replacement":"\"\"","statusReason":"Ignored because of excluded mutation \"StringLiteral\"","status":"Ignored","static":false,"location":{"end":{"column":31,"line":35},"start":{"column":24,"line":35}}},{"id":"436","mutatorName":"StringLiteral","replacement":"\"\"","statusReason":"Ignored because of excluded mutation \"StringLiteral\"","status":"Ignored","static":false,"location":{"end":{"column":35,"line":38},"start":{"column":31,"line":38}}},{"id":"448","mutatorName":"StringLiteral","replacement":"\"\"","statusReason":"Ignored because of excluded mutation \"StringLiteral\ art":{"column":7,"line":174}}},{"id":"535","mutatorName":"BlockStatement","replacement":"{}","statusReason":"expected '# TestProject\\n<"+"!-- ForgeCraft sentin…' to contain 'api'","status":"Killed","static":false,"testsCompleted":12,"killedBy":["111"],"coveredBy":["100","101","102","103","104","105","106","107","108","109","110","111","112","115","116","117","118","119","120"],"location":{"end":{"column":4,"line":176},"start":{"column":32,"line":174}}},{"id":"537","mutatorName":"ArrowFunction","replacement":"() => undefined","statusReason":"expected '# TestProject\\n<"+"!-- ForgeCraft sentin…' to contain 'api'","status":"Killed","static":false,"testsCompleted":12,"killedBy":["111"],"coveredBy":["100","101","102","103","104","105","106","107","108","109","110","111","112","115","116","117","118","119","120"],"location":{"end":{"column":56,"line":175},"start":{"column":34,"line":175}}},{"id":"538","mutatorName":"MethodExpression","replacement":"t.toUpperCase()","statusReason":"expected '# TestProject\\n<"+"!-- ForgeCraft sentin…' to contain 'api'","status":"Killed","static":false,"testsCompleted":12,"killedBy":["111"],"coveredBy":["100","101","102","103","104","105","106","107","108","109","110","111","112","115","116","117","118","119","120"],"location":{"end":{"column":56,"line":175},"start":{"column":41,"line":175}}}],"source":"/**\r\n * Sentinel tree renderer.\r\n *\r\n * Instead of one large instruction file, renders a 3-level lazy tree:\r\n *   Level 0: CLAUDE.md  (~50 lines) — project identity + critical rules + wayfinding\r\n *   Level 1: .claude/standards/{domain}.md — full block content per domain\r\n *\r\n * The AI loads only what the current task requires.\r\n * Typical task: CLAUDE.md (~50 lines) + 1-2 domain files (50-100 lines each).\r\n * vs monolithic: 800-2000+ lines loaded regardless of task.\r\n *\r\n * Only applies to the \"claude\" target — other AI assistants receive the full file\r\n * since they do not support multi-file on-demand loading the same way.\r\n */\r\n\r\nimport { renderTemplate } from \"./renderer.js\";\r\nimport type { InstructionBlock } from \"../shared/types.js\";\r\nimport type { RenderContext } from \"./renderer.js\";\r\nimport {\r\n  BLOCK_DOMAIN_MAP,\r\n  DOMAIN_DESCRIPTIONS,\r\n  DOMAIN_ORDER,\r\n} from \"./sentinel-domain-map.js\";\r\n\r\n// ── Types ─────────────────────────────────────────────────────────────\r\n\r\n/** A single file produced by the sentinel renderer. */\r\nexport interface SentinelFile {\r\n  /** Relative path from project root (e.g., \"CLAUDE.md\" or \".claude/standards/testing.md\"). */\r\n  readonly relativePath: string;\r\n  /** File content ready to write. */\r\n  readonly content: string;\r\n}\r\n\r\n// ── Public API ────────────────────────────────────────────────────────\r\n\r\n/**\r\n * Render the full sentinel tree from composed instruction blocks.\r\n *\r\n * Returns an array of files to write:\r\n * - CLAUDE.md (sentinel, ~50 lines)\r\n * - .claude/standards/{domain}.md for each domain that has content\r\n *\r\n * @param blocks - All composed instruction blocks\r\n * @param context - Project render context\r\n * @returns Array of files to write, CLAUDE.md first\r\n */\r\nexport function renderSentinelTree(\r\n  blocks: InstructionBlock[],\r\n  context: RenderContext,\r\n): SentinelFile[] {\r\n  const byDomain = groupBlocksByDomain(blocks);\r\n  const files: SentinelFile[] = [];\r\n\r\n  // Generate domain standards files\r\n  const domainsWithContent: Array<"+"{ domain: string; description: string }> = [];\r\n\r\n  for (const [domain, domainBlocks] of byDomain) {\r\n    if (domainBlocks.length === 0) continue;\r\n\r\n    const content = renderDomainFile(domain, domainBlocks, context);\r\n    files.push({ relativePath: `.claude/standards/${domain}.md`, content });\r\n\r\n    const description = DOMAIN_DESCRIPTIONS[domain] ?? domain;\r\n    domainsWithContent.push({ domain, description });\r\n  }\r\n\r\n  // Sort domains for consistent wayfinding table order\r\n  domainsWithContent.sort(\r\n    (a, b) =>\r\n      (DOMAIN_ORDER.indexOf(a.domain) ?? 99) -\r\n      (DOMAIN_ORDER.indexOf(b.domain) ?? 99),\r\n  );\r\n\r\n  // Generate sentinel CLAUDE.md (prepend so it's first in the list)\r\n  files.unshift({\r\n    relativePath: \"CLAUDE.md\",\r\n    content: renderSentinelClaudeMd(domainsWithContent, context),\r\n  });\r\n\r\n  return files;\r\n}\r\n\r\n// ── Private helpers ───────────────────────────────────────────────────\r\n\r\n/**\r\n * Group instruction blocks by domain category using the BLOCK_DOMAIN_MAP.\r\n * Blocks with unrecognized IDs fall into \"protocols\" (catch-all).\r\n */\r\nfunction groupBlocksByDomain(\r\n  blocks: InstructionBlock[],\r\n): Map<"+"string, InstructionBlock[]> {\r\n  const map = new Map<"+"string, InstructionBlock[]>();\r\n\r\n  for (const block of blocks) {\r\n    const domain = BLOCK_DOMAIN_MAP[block.id] ?? \"protocols\";\r\n    const existing = map.get(domain) ?? [];\r\n    existing.push(block);\r\n    map.set(domain, existing);\r\n  }\r\n\r\n  return map;\r\n}\r\n\r\n/**\r\n * Render a single domain standards file.\r\n * Contains full rendered block content for all blocks in that domain.\r\n *\r\n * @param domain - Domain name (used in header comment)\r\n * @param blocks - Blocks belonging to this domain\r\n * @param context - Render context for variable substitution\r\n * @returns File content ready to write\r\n */\r\nfunction renderDomainFile(\r\n  domain: string,\r\n  blocks: InstructionBlock[],\r\n  context: RenderContext,\r\n): string {\r\n  const date = new Date().toISOString().split(\"T\")[0];\r\n  const lines: string[] = [\r\n    `<"+"!-- ForgeCraft sentinel: ${domain} | ${date} | npx forgecraft-mcp refresh . --apply to update -->`,\r\n    \"\",\r\n  ];\r\n\r\n  for (const block of blocks) {\r\n    const rendered = renderTemplate(block.content, context).trim();\r\n    if (rendered) {\r\n      lines.push(rendered);\r\n      lines.push(\"\");\r\n    }\r\n  }\r\n\r\n  return lines.join(\"\\n\");\r\n}\r\n\r\n/**\r\n * Render the CNT root CLAUDE.md — exactly 3 lines: project identity + pointer.\r\n *\r\n * Full rules live in .claude/index.md (routing) and .claude/core.md (invariants).\r\n * Domain standards files are in .claude/standards/{domain}.md (generated alongside).\r\n *\r\n * @param _domains - Domains with standards files (unused; wayfinding moved to index.md)\r\n * @param context - Render context\r\n * @returns 3-line CLAUDE.md content ready to write\r\n */\r\nfunction renderSentinelClaudeMd(\r\n  _domains: Array<"+"{ domain: string; description: string }>,\r\n  context: RenderContext,\r\n): string {\r\n  const date = new Date().toISOString().split(\"T\")[0];\r\n  const description = buildProjectDescription(context);\r\n  return [\r\n    `# ${context.projectName}`,\r\n    `<"+"!-- ForgeCraft sentinel | ${date} | npx forgecraft-mcp refresh . --apply to update -->`,\r\n    description,\r\n    ``,\r\n    `Read \\`.claude/index.md\\` before any task. Navigate to the relevant branch. Load core.md always.`,\r\n    ``,\r\n  ].join(\"\\n\");\r\n}\r\n\r\n/**\r\n * Build the one-sentence project description line for CLAUDE.md.\r\n * Uses domain context if available, falls back to tag names.\r\n *\r\n * @param context - Render context\r\n * @returns Single sentence describing the project\r\n */\r\nfunction buildProjectDescription(context: RenderContext): string {\r\n  const nonUniversal = context.tags.filter((t) => t !== \"UNIVERSAL\");\r\n  if (context.domain && context.domain !== \"none\") {\r\n    return `A ${context.domain} project. Must not become a monolith — navigate via \\`.claude/index.md\\`.`;\r\n  }\r\n  if (nonUniversal.length > 0) {\r\n    return `A ${nonUniversal.map((t) => t.toLowerCase()).join(\", \")} project. Must not become a monolith.`;\r\n  }\r\n  return `<"+"!-- FILL: one sentence — what this project is and what it must not become -->`;\r\n}\r\n"}},"schemaVersion":"1.0","thresholds":{"high":90,"low":80,"break":80},"testFiles":{"tests/tools/change-request.test.ts":{"tests":[{"id":"0","name":"slugify produces chg-<"+"date>-<"+"slug> format"},{"id":"1","name":"slugify strips special characters"},{"id":"2","name":"slugify lowercases the title"},{"id":"3","name":"slugify truncates slug to 40 chars"},{"id":"4","name":"slugify trims trailing dashes from slug"},{"id":"5","name":"slugify collapses multiple consecutive spaces into a single dash"},{"id":"6","name":"slugify trims leading and trailing whitespace before slug conversion"},{"id":"7","name":"detectAffectedArtifacts returns empty when no spec files exist"},{"id":"8","name":"detectAffectedArtifacts includes PRD.md for spec-change type even without keyword matches"},{"id":"9","name":"detectAffectedArtifacts includes use-cases.md when title contains 'workflow'"},{"id":"10","name":"detectAffectedArtifacts includes TechSpec.md for architecture keywords"},{"id":"11","name":"detectAffectedArtifacts includes docs/adrs/ for adr-supersession type"},{"id":"12","name":"detectAffectedArtifacts includes openapi.yaml for breaking-api type when present"},{"id":"13","name":"detectAffectedArtifacts does not include files that do not exist"},{"id":"14","name":"detectAffectedArtifacts does not add docs/adrs/ from keyword when type is not adr-supersession and keywords absent"},{"id":"15","name":"detectAffectedArtifacts adds docs/adrs/ for adr-supersession type even without adr keywords in title"},{"id":"16","name":"detectAffectedArtifacts adds docs/adrs/ for non-adr type when title has 'architecture' keyword (>3 chars)"},{"id":"17","name":"detectAffectedArtifacts short words (≤3 chars) are excluded from keyword matching"},{"id":"18","name":"detectAffectedArtifacts deduplicates artifacts"},{"id":"19","name":"detectRequiredGates returns empty when gate dir does not exist"},{"id":"20","name":"detectRequiredGates includes l2-* gates from active dir"},{"id":"21","name":"detectRequiredGates includes contract-testing-required gate"},{"id":"22","name":"detectRequiredGates adds schema gates for breaking-api type"},{"id":"23","name":"detectRequiredGates adds contract gates when breaking=true"},{"id":"24","name":"detectRequiredGates does not duplicate gates"},{"id":"25","name":"serializeChangeRecord + parseChangeRecord round-trip round-trips a minimal record"},{"id":"26","name":"serializeChangeRecord + parseChangeRecord round-trip round-trips breaking_details"},{"id":"27","name":"serializeChangeRecord + parseChangeRecord round-trip round-trips supersedes_adr"},{"id":"28","name":"serializeChangeRecord + parseChangeRecord round-trip round-trips affected_artifacts list"},{"id":"29","name":"serializeChangeRecord + parseChangeRecord round-trip round-trips required_gates list"},{"id":"30","name":"serializeChangeRecord + parseChangeRecord round-trip serialized text has required_gates: [] for empty gates"},{"id":"31","name":"serializeChangeRecord + parseChangeRecord round-trip serialized text contains gate IDs in list format"},{"id":"32","name":"serializeChangeRecord + parseChangeRecord round-trip serialized text includes breaking_details field when set"},{"id":"33","name":"serializeChangeRecord + parseChangeRecord round-trip serialized text omits breaking_details when not set"},{"id":"34","name":"serializeChangeRecord + parseChangeRecord round-trip serialized text includes supersedes_adr field when set"},{"id":"35","name":"serializeChangeRecord + parseChangeRecord round-trip round-trips breaking=false correctly"},{"id":"36","name":"serializeChangeRecord + parseChangeRecord round-trip parseChangeRecord: blocked_reason is returned when not ~ in YAML"},{"id":"37","name":"serializeChangeRecord + parseChangeRecord round-trip parseChangeRecord: blocked_reason is undefined when ~ in YAML"},{"id":"38","name":"serializeChangeRecord + parseChangeRecord round-trip parseChangeRecord: verified_at is returned when not ~ in YAML"},{"id":"39","name":"serializeChangeRecord + parseChangeRecord round-trip parseChangeRecord: verified_at is undefined when ~ in YAML"},{"id":"40","name":"serializeChangeRecord + parseChangeRecord round-trip parseChangeRecord: closed_at is returned when not ~ in YAML"},{"id":"41","name":"serializeChangeRecord + parseChangeRecord round-trip parseChangeRecord: closed_at is undefined when ~ in YAML"},{"id":"42","name":"serializeChangeRecord + parseChangeRecord round-trip returns null for invalid YAML content"},{"id":"43","name":"loadAllChanges returns empty array when changes dir does not exist"},{"id":"44","name":"loadAllChanges returns parsed records from yaml files"},{"id":"45","name":"loadAllChanges skips non-yaml files"},{"id":"46","name":"loadAllChanges handles multiple records"},{"id":"47","name":"getImplementingChanges returns only implementing-status records"},{"id":"48","name":"getImplementingChanges returns empty when no implementing changes"},{"id":"49","name":"changeRequestHandler creates the changes directory and writes a yaml file"},{"id":"50","name":"changeRequestHandler output includes the generated ID"},{"id":"51","name":"changeRequestHandler uses provided affected_artifacts over auto-detection"},{"id":"52","name":"changeRequestHandler shows breaking warning when breaking=true"},{"id":"53","name":"changeRequestHandler shows supersedes_adr notice"},{"id":"54","name":"changeRequestHandler output includes required gates section when gates are non-empty"},{"id":"55","name":"changeRequestHandler output omits required gates section when gates are empty"},{"id":"56","name":"changeRequestHandler breaking=false is preserved in the written yaml"},{"id":"57","name":"changeRequestHandler breaking defaults to false when not provided"},{"id":"58","name":"changeRequestHandler includes Next Steps guidance"},{"id":"59","name":"listChangesHandler returns 'no records' message when changes dir is empty"},{"id":"60","name":"listChangesHandler lists all changes grouped by status"},{"id":"61","name":"listChangesHandler filters by status when status param is provided"},{"id":"62","name":"listChangesHandler shows 'no filter match' message when filtered status has no results"},{"id":"63","name":"listChangesHandler shows close_cycle block warning for implementing changes"},{"id":"64","name":"listChangesHandler never marks verified changes as stale regardless of age"},{"id":"65","name":"listChangesHandler does not show close_cycle warning when no implementing changes exist"},{"id":"66","name":"listChangesHandler shows gate names in close_cycle warning when implementing change has gates"},{"id":"67","name":"listChangesHandler shows dash in gates column for change with no required_gates"},{"id":"68","name":"listChangesHandler shows gate count for change with required_gates"},{"id":"69","name":"listChangesHandler marks stale open changes with warning indicator"},{"id":"70","name":"listChangesHandler never marks closed or verified changes as stale regardless of age"},{"id":"71","name":"listChangesHandler does not mark a change created exactly 7 days ago as stale"},{"id":"72","name":"listChangesHandler marks a change created 8 days ago as stale"}],"source":"/**\n * Tests for src/tools/change-request.ts\n *\n * Covers: slugify, detectAffectedArtifacts, detectRequiredGates,\n * serializeChangeRecord, parseChangeRecord, loadAllChanges,\n * getImplementingChanges, changeRequestHandler, listChangesHandler.\n */\n\nimport { describe, it, expect, beforeEach, afterEach } from \"vitest\";\nimport { mkdirSync, writeFileSync, rmSync, readFileSync, existsSync } from \"node:fs\";\nimport { join } from \"node:path\";\nimport { tmpdir } from \"node:os\";\nimport {\n  slugify,\n  detectAffectedArtifacts,\n  detectRequiredGates,\n  serializeChangeRecord,\n  parseChangeRecord,\n  loadAllChanges,\n  getImplementingChanges,\n  changeRequestHandler,\n  listChangesHandler,\n  changesDir,\n  type ChangeRecord,\n  type ChangeType,\n} from \"../../src/tools/change-request.js\";\n\n// ── Fixtures ──────────────────────────────────────────────────────────\n\nfunction makeRecord(overrides: Partial<"+"ChangeRecord> = {}): ChangeRecord {\n  return {\n    id: \"chg-2026-04-19-replace-jwt-middleware\",\n    title: \"Replace JWT middleware with Clerk SSO\",\n    status: \"open\",\n    type: \"breaking-api\",\n    created: \"2026-04-19\",\n    description: \"Swap the current JWT auth middleware for Clerk SSO integration.\",\n    breaking: true,\n    affected_artifacts: [\"docs/PRD.md\"],\n    required_gates: [],\n    ...overrides,\n  };\n}\n\nlet tmpDir: string;\n\nbeforeEach(() => {\n  tmpDir = join(tmpdir(), `chg-test-${Date.now()}`);\n  mkdirSync(tmpDir, { recursive: true });\n});\n\nafterEach(() => {\n  rmSync(tmpDir, { recursive: true, force: true });\n});\n\n// ── slugify ───────────────────────────────────────────────────────────\n\ndescribe(\"slugify\", () => {\n  it(\"produces chg-<"+"date>-<"+"slug> format\", () => {\n    expect(slugify(\"Replace JWT middleware\", \"2026-04-19\")).toBe(\n      \"chg-2026-04-19-replace-jwt-middleware\",\n    );\n  });\n\n  it(\"strips special characters\", () => {\n    const result = slugify(\"Add OAuth 2.0 / PKCE support!\", \"2026-04-01\");\n    expect(result).toMatch(/^chg-2026-04-01-/);\n    expect(result).not.toMatch(/[!?@#$%^&*()]/);\n  });\n\n  it(\"lowercases the title\", () => {\n    expect(slugify(\"UPPER CASE TITLE\", \"2026-04-01\")).toBe(\n      \"chg-2026-04-01-upper-case-title\",\n    );\n  });\n\n  it(\"truncates slug to 40 chars\", () => {\n    const longTitle = \"This is a very long title that exceeds the forty character limit easily\";\n    const result = slugify(longTitle, \"2026-04-01\");\n    const slug = result.replace(\"chg-2026-04-01-\", \"\");\n    expect(slug.length).toBeLessThanOrEqual(40);\n  });\n\n  it(\"trims trailing dashes from slug\", () => {\n    const result = slugify(\"Hello World----\", \"2026-04-01\");\n    expect(result.endsWith(\"-\")).toBe(false);\n  });\n\n  it(\"collapses multiple consecutive spaces into a single dash\", () => {\n    // Kills Regex L67: /\\s+/ → /\\s/ (would leave extra dashes for multi-space)\n    const result = slugify(\"hello  world\", \"2026-04-01\");\n    expect(result).toBe(\"chg-2026-04-01-hello-world\");\n  });\n\n  it(\"trims leading and trailing whitespace before slug conversion\", () => {\n    // Kills MethodExpression L63: .trim() removal (leading spaces → leading dashes)\n    const result = slugify(\"  hello world  \", \"2026-04-01\");\n    expect(result).toBe(\"chg-2026-04-01-hello-world\");\n  });\n});\n\n// ── detectAffectedArtifacts ────────────────────────────────────────────\n\ndescribe(\"detectAffectedArtifacts\", () => {\n  it(\"returns empty when no spec files exist\", () => {\n    const result = detectAffectedArtifacts(tmpDir, \"Minor tweak\", \"No files here\", \"gate-change\");\n    expect(result).toEqual([]);\n  });\n\n  it(\"includes PRD.md for spec-change type even without keyword matches\", () => {\n    mkdirSync(join(tmpDir, \"docs\"), { recursive: true });\n    writeFileSync(join(tmpDir, \"docs\", \"PRD.md\"), \"# PRD\\n\");\n    const result = detectAffectedArtifacts(tmpDir, \"XYZ123\", \"XYZ456\", \"spec-change\");\n    expect(result).toContain(\"docs/PRD.md\");\n  });\n\n  it(\"includes use-cases.md when title contains 'workflow'\", () => {\n    mkdirSync(join(tmpDir, \"docs\"), { recursive: true });\n    writeFileSync(join(tmpDir, \"docs\", \"use-cases.md\"), \"# Use Cases\\n\");\n    const result = detectAffectedArtifacts(tmpDir, \"Change workflow order\", \"adjust steps\", \"gate-change\");\n    expect(result).toContain(\"docs/use-cases.md\");\n  });\n\n  it(\"includes TechSpec.md for architecture keywords\", () => {\n    mkdirSync(join(tmpDir, \"docs\"), { recursive: true });\n    writeFileSync(join(tmpDir, \"docs\", \"TechSpec.md\"), \"# Tech\\n\");\n    const result = detectAffectedArtifacts(tmpDir, \"Refactor architecture layer\", \"component changes\", \"gate-change\");\n    expect(result).toContain(\"docs/TechSpec.md\");\n  });\n\n  it(\"includes docs/adrs/ for adr-supersession type\", () => {\n    mkdirSync(join(tmpDir, \"docs\", \"adrs\"), { recursive: true });\n    const result = detectAffectedArtifacts(tmpDir, \"Supersede old decision\", \"replacing ADR\", \"adr-supersession\");\n    expect(result).toContain(\"docs/adrs/\");\n  });\n\n  it(\"includes openapi.yaml for breaking-api type when present\", () => {\n    writeFileSync(join(tmpDir, \"openapi.yaml\"), \"openapi: 3.0.0\\n\");\n    const result = detectAffectedArtifacts(tmpDir, \"Remove endpoint\", \"breaking change\", \"breaking-api\");\n    expect(result).toContain(\"openapi.yaml\");\n  });\n\n  it(\"does not include files that do not exist\", () => {\n    const result = detectAffectedArtifacts(tmpDir, \"architecture changes\", \"system component\", \"gate-change\");\n    expect(result).toEqual([]);\n  });\n\n  it(\"does not add docs/adrs/ from keyword when type is not adr-supersession and keywords absent\", () => {\n    // Kills LogicalOperator L106: && → || (would add adrs/ even for non-adr types when any condition true)\n    mkdirSync(join(tmpDir, \"docs\", \"adrs\"), { recursive: true });\n    const result = detectAffectedArtifacts(tmpDir, \"Update login styling\", \"cosmetic changes\", \"spec-change\");\n    expect(result).not.toContain(\"docs/adrs/\");\n  });\n\n  it(\"adds docs/adrs/ for adr-supersession type even without adr keywords in title\", () => {\n    // Kills ConditionalExpression L106: false || words.some(...) — only keyword path active\n    mkdirSync(join(tmpDir, \"docs\", \"adrs\"), { recursive: true });\n    const result = detectAffectedArtifacts(tmpDir, \"Fix typo in template\", \"minor update\", \"adr-supersession\");\n    expect(result).toContain(\"docs/adrs/\");\n  });\n\n  it(\"adds docs/adrs/ for non-adr type when title has 'architecture' keyword (>3 chars)\", () => {\n    // Kills EqualityOperator L106 and confirms keyword-path works independently\n    mkdirSync(join(tmpDir, \"docs\", \"adrs\"), { recursive: true });\n    const result = detectAffectedArtifacts(tmpDir, \"Refactor architecture layer\", \"system redesign\", \"gate-change\");\n    expect(result).toContain(\"docs/adrs/\");\n  });\n\n  it(\"short words (≤3 chars) are excluded from keyword matching\", () => {\n    // Kills EqualityOperator L82: w.length > 3 vs >= 3 (3-char words like 'adr' would match with >=3)\n    mkdirSync(join(tmpDir, \"docs\", \"adrs\"), { recursive: true });\n    // \"adr\" is exactly 3 chars — filtered out by >3, not by >=3\n    const result = detectAffectedArtifacts(tmpDir, \"adr fix\", \"adr update\", \"gate-change\");\n    expect(result).not.toContain(\"docs/adrs/\");\n  });\n\n  it(\"deduplicates artifacts\", () => {\n    mkdirSync(join(tmpDir, \"docs\"), { recursive: true });\n    writeFileSync(join(tmpDir, \"docs\", \"PRD.md\"), \"# PRD\\n\");\n    // spec-change forces PRD inclusion + keyword match both would add it\n    const result = detectAffectedArtifacts(tmpDir, \"product feature requirement\", \"user problem\", \"spec-change\");\n    const prdCount = result.filter((a) => a === \"docs/PRD.md\").length;\n    expect(prdCount).toBe(1);\n  });\n});\n\n// ── detectRequiredGates ────────────────────────────────────────────────\n\ndescribe(\"detectRequiredGates\", () => {\n  it(\"returns empty when gate dir does not exist\", () => {\n    expect(detectRequiredGates(tmpDir, \"spec-change\", false)).toEqual([]);\n  });\n\n  it(\"includes l2-* gates from active dir\", () => {\n    const gateDir = join(tmpDir, \".forgecraft\", \"gates\", \"active\");\n    mkdirSync(gateDir, { recursive: true });\n    writeFileSync(join(gateDir, \"l2-coverage.yaml\"), \"id: l2-coverage\\n\");\n    const result = detectRequiredGates(tmpDir, \"spec-change\", false);\n    expect(result).toContain(\"l2-coverage\");\n  });\n\n  it(\"includes contract-testing-required gate\", () => {\n    const gateDir = join(tmpDir, \".forgecraft\", \"gates\", \"active\");\n    mkdirSync(gateDir, { recursive: true });\n    writeFileSync(join(gateDir, \"contract-testing-required.yaml\"), \"id: contract-testing-required\\n\");\n    const result = detectRequiredGates(tmpDir, \"spec-change\", false);\n    expect(result).toContain(\"contract-testing-required\");\n  });\n\n  it(\"adds schema gates for breaking-api type\", () => {\n    const gateDir = join(tmpDir, \".forgecraft\", \"gates\", \"active\");\n    mkdirSync(gateDir, { recursive: true });\n    writeFileSync(join(gateDir, \"schema-validation.yaml\"), \"id: schema-validation\\n\");\n    const result = detectRequiredGates(tmpDir, \"breaking-api\", false);\n    expect(result).toContain(\"schema-validation\");\n  });\n\n  it(\"adds contract gates when breaking=true\", () => {\n    const gateDir = join(tmpDir, \".forgecraft\", \"gates\", \"active\");\n    mkdirSync(gateDir, { recursive: true });\n    writeFileSync(join(gateDir, \"api-contract-check.yaml\"), \"id: api-contract-check\\n\");\n    const result = detectRequiredGates(tmpDir, \"spec-change\", true);\n    expect(result).toContain(\"api-contract-check\");\n  });\n\n  it(\"does not duplicate gates\", () => {\n    const gateDir = join(tmpDir, \".forgecraft\", \"gates\", \"active\");\n    mkdirSync(gateDir, { recursive: true });\n    writeFileSync(join(gateDir, \"l2-contract.yaml\"), \"id: l2-contract\\n\");\n    // l2-contract matches both l2-* prefix AND contract keyword for breaking-api\n    const result = detectRequiredGates(tmpDir, \"breaking-api\", true);\n    expect(result.filter((g) => g === \"l2-contract\").length).toBe(1);\n  });\n});\n\n// ── serializeChangeRecord / parseChangeRecord ──────────────────────────\n\ndescribe(\"serializeChangeRecord + parseChangeRecord round-trip\", () => {\n  it(\"round-trips a minimal record\", () => {\n    const rec = makeRecord({ required_gates: [], affected_artifacts: [] });\n    const yaml = serializeChangeRecord(rec);\n    const parsed = parseChangeRecord(yaml, rec.id);\n    expect(parsed).not.toBeNull();\n    expect(parsed!.id).toBe(rec.id);\n    expect(parsed!.title).toBe(rec.title);\n    expect(parsed!.status).toBe(\"open\");\n    expect(parsed!.type).toBe(\"breaking-api\");\n    expect(parsed!.breaking).toBe(true);\n  });\n\n  it(\"round-trips breaking_details\", () => {\n    const rec = makeRecord({ breaking_details: \"Removes /api/v1/users endpoint\" });\n    const yaml = serializeChangeRecord(rec);\n    const parsed = parseChangeRecord(yaml, rec.id);\n    expect(parsed!.breaking_details).toBe(\"Removes /api/v1/users endpoint\");\n  });\n\n  it(\"round-trips supersedes_adr\", () => {\n    const rec = makeRecord({ supersedes_adr: \"ADR-0003\", type: \"adr-supersession\" });\n    const yaml = serializeChangeRecord(rec);\n    const parsed = parseChangeRecord(yaml, rec.id);\n    expect(parsed!.supersedes_adr).toBe(\"ADR-0003\");\n  });\n\n  it(\"round-trips affected_artifacts list\", () => {\n    const rec = makeRecord({ affected_artifacts: [\"docs/PRD.md\", \"openapi.yaml\"] });\n    const yaml = serializeChangeRecord(rec);\n    const parsed = parseChangeRecord(yaml, rec.id);\n    expect(parsed!.affected_artifacts).toContain(\"docs/PRD.md\");\n    expect(parsed!.affected_artifacts).toContain(\"openapi.yaml\");\n  });\n\n  it(\"round-trips required_gates list\", () => {\n    const rec = makeRecord({ required_gates: [\"l2-coverage\", \"schema-validation\"] });\n    const yaml = serializeChangeRecord(rec);\n    const parsed = parseChangeRecord(yaml, rec.id);\n    expect(parsed!.required_gates).toContain(\"l2-coverage\");\n    expect(parsed!.required_gates).toContain(\"schema-validation\");\n  });\n\n  it(\"serialized text has required_gates: [] for empty gates\", () => {\n    // Kills ConditionalExpression L193: if (length===0) → if (false) — no [] line emitted\n    const rec = makeRecord({ required_gates: [] });\n    const yaml = serializeChangeRecord(rec);\n    expect(yaml).toContain(\"required_gates:\");\n    expect(yaml).toContain(\"[]\");\n  });\n\n  it(\"serialized text contains gate IDs in list format\", () => {\n    // Kills ConditionalExpression/EqualityOperator L357: if (gates.length > 0) → always false\n    const rec = makeRecord({ required_gates: [\"l2-coverage\", \"schema-check\"] });\n    const yaml = serializeChangeRecord(rec);\n    expect(yaml).toContain(\"l2-coverage\");\n    expect(yaml).toContain(\"schema-check\");\n  });\n\n  it(\"serialized text includes breaking_details field when set\", () => {\n    // Kills ConditionalExpression L178/L343: if (breaking_details) → always false\n    const rec = makeRecord({ breaking_details: \"Removes /api/v1/auth\" });\n    const yaml = serializeChangeRecord(rec);\n    expect(yaml).toContain(\"breaking_details:\");\n    expect(yaml).toContain(\"Removes /api/v1/auth\");\n  });\n\n  it(\"serialized text omits breaking_details when not set\", () => {\n    // Kills ConditionalExpression L178: if (breaking_details) → always true (phantom field)\n    const rec = makeRecord({ breaking_details: undefined });\n    const yaml = serializeChangeRecord(rec);\n    expect(yaml).not.toContain(\"breaking_details:\");\n  });\n\n  it(\"serialized text includes supersedes_adr field when set\", () => {\n    // Kills ConditionalExpression L182/L347: if (supersedes_adr) → always false\n    const rec = makeRecord({ supersedes_adr: \"ADR-0005\" });\n    const yaml = serializeChangeRecord(rec);\n    expect(yaml).toContain(\"supersedes_adr: ADR-0005\");\n  });\n\n  it(\"round-trips breaking=false correctly\", () => {\n    // Kills ConditionalExpression L220: fieldRe(\"breaking\") === \"true\" → always true\n    const rec = makeRecord({ breaking: false });\n    const yaml = serializeChangeRecord(rec);\n    const parsed = parseChangeRecord(yaml, rec.id);\n    expect(parsed!.breaking).toBe(false);\n  });\n\n  it(\"parseChangeRecord: blocked_reason is returned when not ~ in YAML\", () => {\n    // Kills ConditionalExpression/EqualityOperator L223: !== \"~\" → === \"~\" (value always undefined)\n    const yaml = serializeChangeRecord(makeRecord()).replace(\"blocked_reason: ~\", \"blocked_reason: waiting for approval\");\n    const parsed = parseChangeRecord(yaml, \"test-id\");\n    expect(parsed!.blocked_reason).toBe(\"waiting for approval\");\n  });\n\n  it(\"parseChangeRecord: blocked_reason is undefined when ~ in YAML\", () => {\n    // Kills ConditionalExpression L223 always-true: value always returned even when \"~\"\n    const yaml = serializeChangeRecord(makeRecord());\n    const parsed = parseChangeRecord(yaml, \"test-id\");\n    expect(parsed!.blocked_reason).toBeUndefined();\n  });\n\n  it(\"parseChangeRecord: verified_at is returned when not ~ in YAML\", () => {\n    // Kills ConditionalExpression/EqualityOperator L224\n    const yaml = serializeChangeRecord(makeRecord()).replace(\"verified_at: ~\", \"verified_at: 2026-04-20\");\n    const parsed = parseChangeRecord(yaml, \"test-id\");\n    expect(parsed!.verified_at).toBe(\"2026-04-20\");\n  });\n\n  it(\"parseChangeRecord: verified_at is undefined when ~ in YAML\", () => {\n    const yaml = serializeChangeRecord(makeRecord());\n    const parsed = parseChangeRecord(yaml, \"test-id\");\n    expect(parsed!.verified_at).toBeUndefined();\n  });\n\n  it(\"parseChangeRecord: closed_at is returned when not ~ in YAML\", () => {\n    // Kills ConditionalExpression/EqualityOperator L225\n    const yaml = serializeChangeRecord(makeRecord()).replace(\"closed_at: ~\", \"closed_at: 2026-04-20\");\n    const parsed = parseChangeRecord(yaml, \"test-id\");\n    expect(parsed!.closed_at).toBe(\"2026-04-20\");\n  });\n\n  it(\"parseChangeRecord: closed_at is undefined when ~ in YAML\", () => {\n    const yaml = serializeChangeRecord(makeRecord());\n    const parsed = parseChangeRecord(yaml, \"test-id\");\n    expect(parsed!.closed_at).toBeUndefined();\n  });\n\n  it(\"returns null for invalid YAML content\", () => {\n    const parsed = parseChangeRecord(\"\", \"orphan-id\");\n    // Should not throw; returns a record with empty/default fields (not null because try succeeds)\n    expect(parsed).not.toBeNull();\n  });\n});\n\n// ── loadAllChanges / getImplementingChanges ────────────────────────────\n\ndescribe(\"loadAllChanges\", () => {\n  it(\"returns empty array when changes dir does not exist\", () => {\n    expect(loadAllChanges(tmpDir)).toEqual([]);\n  });\n\n  it(\"returns parsed records from yaml files\", () => {\n    const dir = changesDir(tmpDir);\n    mkdirSync(dir, { recursive: true });\n    const rec = makeRecord({ status: \"open\" });\n    writeFileSync(join(dir, `${rec.id}.yaml`), serializeChangeRecord(rec));\n    const loaded = loadAllChanges(tmpDir);\n    expect(loaded).toHaveLength(1);\n    expect(loaded[0]!.title).toBe(rec.title);\n  });\n\n  it(\"skips non-yaml files\", () => {\n    const dir = changesDir(tmpDir);\n    mkdirSync(dir, { recursive: true });\n    writeFileSync(join(dir, \"README.md\"), \"# Changes\");\n    expect(loadAllChanges(tmpDir)).toEqual([]);\n  });\n\n  it(\"handles multiple records\", () => {\n    const dir = changesDir(tmpDir);\n    mkdirSync(dir, { recursive: true });\n    const r1 = makeRecord({ id: \"chg-2026-04-01-first\", status: \"open\" });\n    const r2 = makeRecord({ id: \"chg-2026-04-02-second\", status: \"implementing\" });\n    writeFileSync(join(dir, `${r1.id}.yaml`), serializeChangeRecord(r1));\n    writeFileSync(join(dir, `${r2.id}.yaml`), serializeChangeRecord(r2));\n    expect(loadAllChanges(tmpDir)).toHaveLength(2);\n  });\n});\n\ndescribe(\"getImplementingChanges\", () => {\n  it(\"returns only implementing-status records\", () => {\n    const dir = changesDir(tmpDir);\n    mkdirSync(dir, { recursive: true });\n    const open = makeRecord({ id: \"chg-open\", status: \"open\" });\n    const impl = makeRecord({ id: \"chg-impl\", status: \"implementing\" });\n    const closed = makeRecord({ id: \"chg-closed\", status: \"closed\" });\n    writeFileSync(join(dir, `${open.id}.yaml`), serializeChangeRecord(open));\n    writeFileSync(join(dir, `${impl.id}.yaml`), serializeChangeRecord(impl));\n    writeFileSync(join(dir, `${closed.id}.yaml`), serializeChangeRecord(closed));\n    const result = getImplementingChanges(tmpDir);\n    expect(result).toHaveLength(1);\n    expect(result[0]!.id).toBe(\"chg-impl\");\n  });\n\n  it(\"returns empty when no implementing changes\", () => {\n    expect(getImplementingChanges(tmpDir)).toEqual([]);\n  });\n});\n\n// ── changeRequestHandler ───────────────────────────────────────────────\n\ndescribe(\"changeRequestHandler\", () => {\n  it(\"creates the changes directory and writes a yaml file\", async () => {\n    const result = await changeRequestHandler({\n      project_dir: tmpDir,\n      title: \"Replace JWT middleware\",\n      description: \"Swap JWT for Clerk SSO\",\n      type: \"breaking-api\",\n      breaking: true,\n    });\n    const dir = changesDir(tmpDir);\n    const files = (await import(\"node:fs\")).readdirSync(dir).filter((f) => f.endsWith(\".yaml\"));\n    expect(files).toHaveLength(1);\n    expect(result.content[0]!.text).toContain(\"Change Request Opened\");\n  });\n\n  it(\"output includes the generated ID\", async () => {\n    const result = await changeRequestHandler({\n      project_dir: tmpDir,\n      title: \"Add new endpoint\",\n      description: \"Adds /api/v2/users\",\n      type: \"breaking-api\",\n    });\n    expect(result.content[0]!.text).toMatch(/\\*\\*ID:\\*\\* `chg-\\d{4}-\\d{2}-\\d{2}-/);\n  });\n\n  it(\"uses provided affected_artifacts over auto-detection\", async () => {\n    const result = await changeRequestHandler({\n      project_dir: tmpDir,\n      title: \"Change something\",\n      description: \"Details\",\n      type: \"spec-change\",\n      affected_artifacts: [\"custom/path.md\"],\n    });\n    expect(result.content[0]!.text).toContain(\"custom/path.md\");\n  });\n\n  it(\"shows breaking warning when breaking=true\", async () => {\n    const result = await changeRequestHandler({\n      project_dir: tmpDir,\n      title: \"Break the API\",\n      description: \"Removes endpoint\",\n      type: \"breaking-api\",\n      breaking: true,\n      breaking_details: \"Removes /api/v1/auth\",\n    });\n    expect(result.content[0]!.text).toContain(\"Removes /api/v1/auth\");\n  });\n\n  it(\"shows supersedes_adr notice\", async () => {\n    const result = await changeRequestHandler({\n      project_dir: tmpDir,\n      title: \"Supersede old ADR\",\n      description: \"New architecture decision\",\n      type: \"adr-supersession\",\n      supersedes_adr: \"ADR-0002\",\n    });\n    expect(result.content[0]!.text).toContain(\"ADR-0002\");\n  });\n\n  it(\"output includes required gates section when gates are non-empty\", async () => {\n    // Kills ConditionalExpression L357: if (gates.length > 0) → false (section never shown)\n    const gateDir = join(tmpDir, \".forgecraft\", \"gates\", \"active\");\n    mkdirSync(gateDir, { recursive: true });\n    writeFileSync(join(gateDir, \"l2-coverage.yaml\"), \"id: l2-coverage\\n\");\n    const result = await changeRequestHandler({\n      project_dir: tmpDir,\n      title: \"Add new endpoint\",\n      description: \"Adds /api/v2/users\",\n      type: \"breaking-api\",\n      breaking: true,\n    });\n    expect(result.content[0]!.text).toContain(\"Required Gates\");\n    expect(result.content[0]!.text).toContain(\"l2-coverage\");\n  });\n\n  it(\"output omits required gates section when gates are empty\", async () => {\n    // Kills ConditionalExpression L357: if (gates.length > 0) → true (phantom header)\n    const result = await changeRequestHandler({\n      project_dir: tmpDir,\n      title: \"Minor fix\",\n      description: \"Tiny adjustment\",\n      type: \"gate-change\",\n    });\n    expect(result.content[0]!.text).not.toContain(\"Required Gates\");\n  });\n\n  it(\"breaking=false is preserved in the written yaml\", async () => {\n    // Kills BooleanLiteral L312/L322: ?? false → ?? true (breaking becomes true when not specified)\n    await changeRequestHandler({\n      project_dir: tmpDir,\n      title: \"Non-breaking change\",\n      description: \"Small addition\",\n      type: \"spec-change\",\n      breaking: false,\n    });\n    const dir = changesDir(tmpDir);\n    const files = (await import(\"node:fs\")).readdirSync(dir).filter((f) => f.endsWith(\".yaml\"));\n    const yaml = readFileSync(join(dir, files[0]!), \"utf-8\");\n    expect(yaml).toContain(\"breaking: false\");\n  });\n\n  it(\"breaking defaults to false when not provided\", async () => {\n    // Kills LogicalOperator L312: ?? false → && false (breaking always false regardless of arg)\n    await changeRequestHandler({\n      project_dir: tmpDir,\n      title: \"Non-breaking change\",\n      description: \"Small addition\",\n      type: \"spec-change\",\n    });\n    const dir = changesDir(tmpDir);\n    const files = (await import(\"node:fs\")).readdirSync(dir).filter((f) => f.endsWith(\".yaml\"));\n    const yaml = readFileSync(join(dir, files[0]!), \"utf-8\");\n    expect(yaml).toContain(\"breaking: false\");\n  });\n\n  it(\"includes Next Steps guidance\", async () => {\n    const result = await changeRequestHandler({\n      project_dir: tmpDir,\n      title: \"New feature\",\n      description: \"Adding X\",\n      type: \"spec-change\",\n    });\n    expect(result.content[0]!.text).toContain(\"Next Steps\");\n    expect(result.content[0]!.text).toContain(\"propose_session\");\n  });\n});\n\n// ── listChangesHandler ─────────────────────────────────────────────────\n\ndescribe(\"listChangesHandler\", () => {\n  it(\"returns 'no records' message when changes dir is empty\", async () => {\n    const result = await listChangesHandler({ project_dir: tmpDir });\n    expect(result.content[0]!.text).toContain(\"No change records found\");\n  });\n\n  it(\"lists all changes grouped by status\", async () => {\n    const dir = changesDir(tmpDir);\n    mkdirSync(dir, { recursive: true });\n    const open = makeRecord({ id: \"chg-open\", status: \"open\" });\n    const impl = makeRecord({ id: \"chg-impl\", status: \"implementing\" });\n    writeFileSync(join(dir, `${open.id}.yaml`), serializeChangeRecord(open));\n    writeFileSync(join(dir, `${impl.id}.yaml`), serializeChangeRecord(impl));\n\n    const result = await listChangesHandler({ project_dir: tmpDir });\n    expect(result.content[0]!.text).toContain(\"2 total\");\n    expect(result.content[0]!.text).toContain(\"Open\");\n    expect(result.content[0]!.text).toContain(\"Implementing\");\n  });\n\n  it(\"filters by status when status param is provided\", async () => {\n    const dir = changesDir(tmpDir);\n    mkdirSync(dir, { recursive: true });\n    const open = makeRecord({ id: \"chg-open\", status: \"open\" });\n    const verified = makeRecord({ id: \"chg-verified\", status: \"verified\" });\n    writeFileSync(join(dir, `${open.id}.yaml`), serializeChangeRecord(open));\n    writeFileSync(join(dir, `${verified.id}.yaml`), serializeChangeRecord(verified));\n\n    const result = await listChangesHandler({ project_dir: tmpDir, status: \"verified\" });\n    expect(result.content[0]!.text).toContain(\"1 total\");\n    expect(result.content[0]!.text).not.toContain(\"chg-open\");\n  });\n\n  it(\"shows 'no filter match' message when filtered status has no results\", async () => {\n    const result = await listChangesHandler({ project_dir: tmpDir, status: \"blocked\" });\n    expect(result.content[0]!.text).toContain(\"No changes with status\");\n  });\n\n  it(\"shows close_cycle block warning for implementing changes\", async () => {\n    const dir = changesDir(tmpDir);\n    mkdirSync(dir, { recursive: true });\n    const impl = makeRecord({ id: \"chg-impl\", status: \"implementing\", required_gates: [\"l2-coverage\"] });\n    writeFileSync(join(dir, `${impl.id}.yaml`), serializeChangeRecord(impl));\n\n    const result = await listChangesHandler({ project_dir: tmpDir });\n    expect(result.content[0]!.text).toContain(\"close_cycle will be blocked\");\n    expect(result.content[0]!.text).toContain(\"l2-coverage\");\n  });\n\n  it(\"never marks verified changes as stale regardless of age\", async () => {\n    // Kills ConditionalExpression L458: || false removes verified status from exclusion\n    const dir = changesDir(tmpDir);\n    mkdirSync(dir, { recursive: true });\n    const old = makeRecord({ id: \"chg-old-verified\", status: \"verified\", created: \"2020-01-01\" });\n    writeFileSync(join(dir, `${old.id}.yaml`), serializeChangeRecord(old));\n    const result = await listChangesHandler({ project_dir: tmpDir });\n    expect(result.content[0]!.text).not.toContain(\"stale\");\n  });\n\n  it(\"does not show close_cycle warning when no implementing changes exist\", async () => {\n    // Kills ConditionalExpression/EqualityOperator L441: always true shows warning even with no implementing\n    const dir = changesDir(tmpDir);\n    mkdirSync(dir, { recursive: true });\n    const open = makeRecord({ id: \"chg-open\", status: \"open\" });\n    writeFileSync(join(dir, `${open.id}.yaml`), serializeChangeRecord(open));\n    const result = await listChangesHandler({ project_dir: tmpDir });\n    expect(result.content[0]!.text).not.toContain(\"close_cycle will be blocked\");\n  });\n\n  it(\"shows gate names in close_cycle warning when implementing change has gates\", async () => {\n    // Kills ConditionalExpression/EqualityOperator L445: always-false skips gate sub-section\n    const dir = changesDir(tmpDir);\n    mkdirSync(dir, { recursive: true });\n    const impl = makeRecord({ id: \"chg-impl\", status: \"implementing\", required_gates: [\"schema-validation\"] });\n    writeFileSync(join(dir, `${impl.id}.yaml`), serializeChangeRecord(impl));\n    const result = await listChangesHandler({ project_dir: tmpDir });\n    expect(result.content[0]!.text).toContain(\"schema-validation\");\n  });\n\n  it(\"shows dash in gates column for change with no required_gates\", async () => {\n    // Kills ConditionalExpression/EqualityOperator L434: always-true shows count even for empty\n    const dir = changesDir(tmpDir);\n    mkdirSync(dir, { recursive: true });\n    const noGates = makeRecord({ id: \"chg-no-gates\", required_gates: [] });\n    writeFileSync(join(dir, `${noGates.id}.yaml`), serializeChangeRecord(noGates));\n    const result = await listChangesHandler({ project_dir: tmpDir });\n    expect(result.content[0]!.text).toContain(\"—\");\n  });\n\n  it(\"shows gate count for change with required_gates\", async () => {\n    // Kills ConditionalExpression/EqualityOperator L434: always-false never shows count\n    const dir = changesDir(tmpDir);\n    mkdirSync(dir, { recursive: true });\n    const withGates = makeRecord({ id: \"chg-gates\", required_gates: [\"l2-coverage\"] });\n    writeFileSync(join(dir, `${withGates.id}.yaml`), serializeChangeRecord(withGates));\n    const result = await listChangesHandler({ project_dir: tmpDir });\n    // Gate count \"1\" should appear in the listing line\n    expect(result.content[0]!.text).not.toContain(\"gates: —\");\n  });\n\n  it(\"marks stale open changes with warning indicator\", async () => {\n    const dir = changesDir(tmpDir);\n    mkdirSync(dir, { recursive: true });\n    const stale = makeRecord({\n      id: \"chg-stale\",\n      status: \"open\",\n      created: \"2026-01-01\", // well past 7 days\n    });\n    writeFileSync(join(dir, `${stale.id}.yaml`), serializeChangeRecord(stale));\n\n    const result = await listChangesHandler({ project_dir: tmpDir });\n    expect(result.content[0]!.text).toContain(\"stale\");\n  });\n\n  it(\"never marks closed or verified changes as stale regardless of age\", async () => {\n    const dir = changesDir(tmpDir);\n    mkdirSync(dir, { recursive: true });\n    const old = makeRecord({ id: \"chg-old-closed\", status: \"closed\", created: \"2020-01-01\" });\n    writeFileSync(join(dir, `${old.id}.yaml`), serializeChangeRecord(old));\n    const result = await listChangesHandler({ project_dir: tmpDir });\n    expect(result.content[0]!.text).not.toContain(\"stale\");\n  });\n\n  it(\"does not mark a change created exactly 7 days ago as stale\", async () => {\n    // isStale uses days > 7 (strict), so day 7 is NOT stale\n    const dir = changesDir(tmpDir);\n    mkdirSync(dir, { recursive: true });\n    const today = new Date();\n    const sevenDaysAgo = new Date(today);\n    sevenDaysAgo.setDate(today.getDate() - 7);\n    const created = sevenDaysAgo.toISOString().slice(0, 10);\n    const rec = makeRecord({ id: \"chg-day7\", status: \"open\", created });\n    writeFileSync(join(dir, `${rec.id}.yaml`), serializeChangeRecord(rec));\n\n    const result = await listChangesHandler({ project_dir: tmpDir });\n    expect(result.content[0]!.text).not.toContain(\"stale\");\n  });\n\n  it(\"marks a change created 8 days ago as stale\", async () => {\n    const dir = changesDir(tmpDir);\n    mkdirSync(dir, { recursive: true });\n    const today = new Date();\n    const eightDaysAgo = new Date(today);\n    eightDaysAgo.setDate(today.getDate() - 8);\n    const created = eightDaysAgo.toISOString().slice(0, 10);\n    const rec = makeRecord({ id: \"chg-day8\", status: \"open\", created });\n    writeFileSync(join(dir, `${rec.id}.yaml`), serializeChangeRecord(rec));\n\n    const result = await listChangesHandler({ project_dir: tmpDir });\n    expect(result.content[0]!.text).toContain(\"stale\");\n  });\n});\n"},"tests/analyzers/scorers/verifiable-scorer.test.ts":{"tests":[{"id":"73","name":"score 0 — no tests returns score 0 when no test files exist"},{"id":"74","name":"score 0 — no tests returns score 2 when only test files exist (no source to miss)"},{"id":"75","name":"score 1 — tests exist but coverage or pass is insufficient returns score 1 when tests fail even with good coverage"},{"id":"76","name":"score 1 — tests exist but coverage or pass is insufficient returns score 1 when coverage is below 80%"},{"id":"77","name":"score 1 — tests exist but coverage or pass is insufficient includes missing count in evidence"},{"id":"78","name":"score 2 — tests pass and coverage ≥ 80% returns score 2 when all tests pass and no missing files"},{"id":"79","name":"score 2 — tests pass and coverage ≥ 80% returns score 2 when missing ≤ 20% of source modules"},{"id":"80","name":"score 2 — tests pass and coverage ≥ 80% returns score 2 when exactly 20% missing (boundary — ≤ not <"+")"},{"id":"81","name":"score 2 — tests pass and coverage ≥ 80% returns score 1 when exactly 21% missing"},{"id":"82","name":"evidence content evidence[0] is test-file count when score is 1 (not empty array)"},{"id":"83","name":"evidence content coveredPct uses (1 - missingPct), not (1 + missingPct)"},{"id":"84","name":"evidence content test files are excluded from sourceCount (not double-counted as source)"}],"source":"import { describe, it, expect } from \"vitest\";\nimport { scoreVerifiable } from \"../../../src/analyzers/scorers/verifiable-scorer.js\";\nimport type { MissingTestFile } from \"../../../src/shared/types.js\";\n\nfunction missing(src: string, expected: string): MissingTestFile {\n  return { sourceFile: src, expectedTestFile: expected };\n}\n\nconst testFiles = [\"tests/tools/audit.test.ts\", \"tests/shared/errors.test.ts\"];\nconst sourceFiles = [\"src/tools/audit.ts\", \"src/tools/refresh.ts\", \"src/shared/errors.ts\"];\nconst allFiles = [...testFiles, ...sourceFiles];\n\ndescribe(\"score 0 — no tests\", () => {\n  it(\"returns score 0 when no test files exist\", () => {\n    const result = scoreVerifiable(true, [], sourceFiles);\n    expect(result.score).toBe(0);\n    expect(result.property).toBe(\"verifiable\");\n    expect(result.evidence[0]).toMatch(/No test files found/);\n  });\n\n  it(\"returns score 2 when only test files exist (no source to miss)\", () => {\n    // sourceCount=0 → missingPct=0 (guarded) → should score 2 if tests pass\n    // Kills: ConditionalExpression L28 (sourceCount>0→true makes 0/0=NaN, NaN≤0.2=false → score 1)\n    const result = scoreVerifiable(true, [], [\"tests/foo.test.ts\"]);\n    expect(result.score).toBe(2);\n  });\n});\n\ndescribe(\"score 1 — tests exist but coverage or pass is insufficient\", () => {\n  it(\"returns score 1 when tests fail even with good coverage\", () => {\n    const result = scoreVerifiable(false, [], allFiles);\n    expect(result.score).toBe(1);\n    expect(result.evidence.some((e) => e.includes(\"did not pass\"))).toBe(true);\n  });\n\n  it(\"returns score 1 when coverage is below 80%\", () => {\n    const manyMissing = Array.from({ length: 10 }, (_, i) =>\n      missing(`src/tools/tool${i}.ts`, `tests/tools/tool${i}.test.ts`),\n    );\n    const bigSourceSet = [...allFiles, ...manyMissing.map((m) => m.sourceFile)];\n    const result = scoreVerifiable(true, manyMissing, bigSourceSet);\n    expect(result.score).toBe(1);\n    expect(result.evidence.some((e) => e.includes(\"module(s) without tests\"))).toBe(true);\n  });\n\n  it(\"includes missing count in evidence\", () => {\n    const manyMissing = Array.from({ length: 5 }, (_, i) =>\n      missing(`src/m${i}.ts`, `tests/m${i}.test.ts`),\n    );\n    const bigSourceSet = [...allFiles, ...manyMissing.map((m) => m.sourceFile)];\n    const result = scoreVerifiable(true, manyMissing, bigSourceSet);\n    expect(result.evidence.some((e) => e.includes(\"5\"))).toBe(true);\n  });\n});\n\ndescribe(\"score 2 — tests pass and coverage ≥ 80%\", () => {\n  it(\"returns score 2 when all tests pass and no missing files\", () => {\n    const result = scoreVerifiable(true, [], allFiles);\n    expect(result.score).toBe(2);\n    expect(result.evidence[0]).toMatch(/Tests passed/);\n    expect(result.evidence[1]).toMatch(/100%/);\n  });\n\n  it(\"returns score 2 when missing ≤ 20% of source modules\", () => {\n    // 10 source, 1 missing = 90% coverage → score 2\n    const sources = Array.from({ length: 10 }, (_, i) => `src/m${i}.ts`);\n    const tests = Array.from({ length: 9 }, (_, i) => `tests/m${i}.test.ts`);\n    const oneM = [missing(\"src/m9.ts\", \"tests/m9.test.ts\")];\n    const result = scoreVerifiable(true, oneM, [...sources, ...tests]);\n    expect(result.score).toBe(2);\n  });\n\n  it(\"returns score 2 when exactly 20% missing (boundary — ≤ not <"+")\", () => {\n    // 5 source, 1 missing = 20% exactly → score 2 (kills EqualityOperator L31: <"+"= vs <"+")\n    const sources = Array.from({ length: 5 }, (_, i) => `src/m${i}.ts`);\n    const tests = Array.from({ length: 4 }, (_, i) => `tests/m${i}.test.ts`);\n    const oneM = [missing(\"src/m4.ts\", \"tests/m4.test.ts\")];\n    const result = scoreVerifiable(true, oneM, [...sources, ...tests]);\n    expect(result.score).toBe(2);\n  });\n\n  it(\"returns score 1 when exactly 21% missing\", () => {\n    // 10 source, 3 missing = 70% → below threshold\n    const sources = Array.from({ length: 10 }, (_, i) => `src/m${i}.ts`);\n    const tests = Array.from({ length: 7 }, (_, i) => `tests/m${i}.test.ts`);\n    const missing3 = Array.from({ length: 3 }, (_, i) =>\n      missing(`src/m${7 + i}.ts`, `tests/m${7 + i}.test.ts`),\n    );\n    const result = scoreVerifiable(true, missing3, [...sources, ...tests]);\n    expect(result.score).toBe(1);\n  });\n});\n\ndescribe(\"evidence content\", () => {\n  it(\"evidence[0] is test-file count when score is 1 (not empty array)\", () => {\n    // Kills ArrayDeclaration L38: if evidence starts as [], first push would be \"did not pass\"\n    const result = scoreVerifiable(false, [], allFiles);\n    expect(result.evidence[0]).toMatch(/test file\\(s\\) found/);\n  });\n\n  it(\"coveredPct uses (1 - missingPct), not (1 + missingPct)\", () => {\n    // 4 source, 2 missing = 50% missing → coveredPct=50%, not 150%\n    // Kills ArithmeticOperator L29\n    const sources = Array.from({ length: 4 }, (_, i) => `src/m${i}.ts`);\n    const tests = Array.from({ length: 2 }, (_, i) => `tests/m${i}.test.ts`);\n    const twoM = Array.from({ length: 2 }, (_, i) =>\n      missing(`src/m${2 + i}.ts`, `tests/m${2 + i}.test.ts`),\n    );\n    const result = scoreVerifiable(tr
