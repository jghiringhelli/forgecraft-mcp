id: mutation-testing
title: Mutation Testing Gate — Pre-Release Test Quality Verification
description: >
  Verify that the test suite actually catches real bugs by injecting synthetic
  faults into the codebase and confirming that tests fail when the code is
  broken.
category: test-quality
gsProperty: verifiable
phase: pre-release
hook: pre-release
check: >
  Run mutation testing on changed files. Inject synthetic bugs: operator
  replacement (== to !=, + to -, < to <=), boundary inversion (off-by-one), and
  return value mutation (return null, return empty). If tests don't catch the
  injected bug, the test suite is checking the wrong things. Minimum score 80%
  on changed files. Tools: Stryker (JS/TS), PITest (Java), mutmut (Python),
  cargo-mutants (Rust).
passCriterion: >
  MSI >= 80% on changed files. No surviving mutants in critical path code (auth,
  permissions, financial calculations).
tags:
  - UNIVERSAL
layers:
  - layer: L1
    description: >
      Blueprint completeness signal: measures whether the test suite constitutes
      a genuine behavioral specification or merely documentation. A test that does
      not kill mutations is not a contract — it passes on incorrect implementations.
      Required before claiming L1 completeness on any use case.
    when: >
      Fire when mutation score drops below threshold on changed or new code.
      Pre-commit on test files; PR gate on all modified paths.
  - layer: L2
    description: >
      Harness probe validity: a probe that passes on incorrectly-mutated code is
      not a valid behavioral assertion. Mutation score on harness files validates
      that probes detect actual violations rather than testing their own structure.
    when: >
      Fire when harness probe files exist but mutation score on probe code is
      below threshold. Surfaces probes that assert on the wrong invariants.
generalizable: true
evidence: >
  GS experiments found 40-50% MSI on naive agent-generated test suites. Between
  1-2 out of 3 agent-generated tests provide no real coverage. Explicit mutation
  gate consistently raises this to 80%+.
status: approved
approvedAt: '2026-03-01'
contributor: jghiringhelli
_path: gates/universal/mutation-testing.yaml
