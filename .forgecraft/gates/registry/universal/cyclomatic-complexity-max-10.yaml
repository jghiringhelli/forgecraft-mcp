id: cyclomatic-complexity-max-10
title: Cyclomatic Complexity — Maximum 10 Per Function
description: >
  No function may have a cyclomatic complexity greater than 10. Complexity above
  10 indicates a function that is doing too much, is hard to test completely,
  and is difficult for an AI to reason about correctly. This is a direct
  enforcement of the Bounded property: each function has a limited,
  understandable decision space.
category: code-quality
gsProperty: bounded
phase: development
hook: pre-commit
check: >
  ENFORCED EXECUTABLY by pre-commit-complexity.sh (stack-dispatched, blocking):
    TS/JS  → eslint complexity rule ("complexity": ["error", 10])
    Python → radon cc (any block > 10)
    Go     → gocyclo -over 10
    Rust   → clippy cognitive_complexity (via pre-commit-clippy.sh)
  The hook skips (does not fail) only when no complexity tool is installed for
  the staged stack — install the tool to make the gate block. Fix violations by
  decomposing the function into smaller, single-purpose functions.
passCriterion: >
  pre-commit-complexity.sh exits 0 — zero functions with cyclomatic complexity
  > 10 across any supported stack.
tags:
  - UNIVERSAL
generalizable: true
evidence: >
  High cyclomatic complexity is consistently correlated with defect density
  (McCabe 1976, replicated across multiple industrial studies). Functions with
  complexity > 10 require exponentially more test cases for full branch
  coverage. In AI-assisted development, high-complexity functions are
  particularly risky: the AI must track more conditional paths simultaneously
  and is more likely to miss edge cases. The threshold of 10 is the standard
  industry threshold (SonarQube default, ESLint default).
status: approved
approvedAt: '2026-03-27'
contributor: jghiringhelli
_path: gates/code-quality/cyclomatic-complexity-max-10.yaml
