id: lte-ephemeral-infra
title: LTE Ephemeral Infrastructure — Teardown Script Required
description: >
  Load test environments (class: lte) must be ephemeral: created on demand
  and fully destroyed after test runs. A teardown script or IaC destroy
  target must exist to prevent LTE environments from persisting indefinitely
  and accruing unnecessary cost and security exposure.
domain: environment-hygiene
gsProperty: auditable
phase: pre-release
hook: pre-push
implementation: logic
check: >
  When forgecraft.yaml declares any environment with class: lte or ephemeral: true,
  verify that at least one of the following exists in the project:
  - infra/teardown.sh or infra/teardown.ps1
  - infra/destroy.sh
  - A Terraform/Pulumi destroy target (terraform destroy or pulumi destroy command
    documented in Makefile, package.json scripts, or README under a "teardown" heading)
  - A Railway/Fly/Render delete command documented in the deployment runbook
passCriterion: >
  At least one of: infra/teardown.* exists, IaC destroy target is documented
  in scripts or README, or deployment runbook contains teardown instructions.
failureMessage: >
  LTE environment declared but no teardown script or IaC destroy target found.
  Ephemeral environments without teardown scripts become permanent and accrue cost.
fixHint: Create infra/teardown.sh with your IaC destroy command.
tags:
  - INFRA
priority: P1
likelihood: low
impact: medium
confidence: high
generalizable: true
evidence: >
  Load test environments provisioned for a performance sprint were left running
  for weeks after the sprint ended because no automated teardown existed. The
  environments held anonymized production data and accrued significant cost.
source: registry
status: ready
addedAt: '2026-04-08T00:00:00.000Z'
