id: content-security-policy-set
title: Content-Security-Policy Set on Externally-Accessible Services
description: >
  Any environment reachable from the public internet must serve a
  Content-Security-Policy (CSP) header that is not wide-open. A missing or
  `default-src *` / `unsafe-inline` CSP provides no XSS mitigation. The policy
  must at minimum constrain default-src and script-src to known origins.
domain: security
gsProperty: defended
phase: pre-release
hook: pre-push
implementation: cli
check: >
  Confirm a Content-Security-Policy response header exists and is restrictive on
  every environment declared externallyAccessible: true. Reject a policy that is
  absent, set to `default-src *`, or relies on `unsafe-inline`/`unsafe-eval` for
  script-src without a nonce/hash. Live check:
  curl -sI "$API_URL" | grep -i 'content-security-policy'
passCriterion: >
  A Content-Security-Policy header is present and constrains at least default-src
  and script-src to explicit origins (no bare wildcard, no unguarded
  unsafe-inline) for every externally-accessible environment.
failureMessage: >
  Externally-accessible environment has no Content-Security-Policy, or a policy
  permissive enough to provide no XSS protection (wildcard default-src or
  unguarded unsafe-inline).
fixHint: >
  Set a restrictive CSP via middleware (helmet contentSecurityPolicy) or proxy.
  Start from default-src 'self' and widen deliberately per asset origin.
tags:
  - INFRA
  - API
  - WEB-REACT
  - WEB-NEXT
  - UNIVERSAL
priority: P1
likelihood: high
impact: high
confidence: medium
generalizable: true
evidence: >
  CSP is the most effective defense-in-depth control against reflected and
  stored XSS, but is frequently shipped either absent or as an ineffective
  wildcard because a permissive policy "works" in the browser without warning.
  This gate exists because the deployment schema advertised a "CSP gate" for
  externallyAccessible environments while no such gate was wired.
source: registry
status: ready
addedAt: '2026-06-10T00:00:00.000Z'
