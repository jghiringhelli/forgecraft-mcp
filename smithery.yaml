  - code-quality
  - project-scaffolding

tags:
  - mcp
  - claude
  - copilot
  - cursor
  - engineering-standards
  - solid
  - testing
  - architecture
  - scaffolding

# Hosted HTTP endpoint for Smithery gallery listing
# Local stdio mode: npx forgecraft-mcp (unchanged)
mcpUrl: https://forgecraft-http-production.up.railway.app/mcp

tools:
  - name: forgecraft
    description: Diagnose ForgeCraft project state and return CLI commands to run locally
  - name: list_tags
    description: Return all 24 ForgeCraft classification tags
